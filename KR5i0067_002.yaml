front:
  text: 天仙正理直論天仙正理直論增注
  hash: sha256:e751294c64ba13705c39f0b9e0816fbe4f00e9c1d536b4bc181bfa8cc83cd4b2
  markers:
  - {type: page-break, offset: 6, content: '', id: CK-KZ_KR5i0067_02p001a}
body:
  text: 本序并注伍沖虛子自序曰昔曹老師語我云仙道簡易只神氣二者而己修仙者必用精氣神三寶此言只神氣二者以精在氣中精氣本是一故也一神一氣即是一陰一陽豫於是知所以長生者以氣氣者先天氣即腎中真陽之精也人從此氣以得生亦修此氣而長生唯用修而得長其生故稱修命陳希夷所以云留得陽精決定長生是也所以神通者以神神者元神即元性為煉金丹之主人修行人能以神馭氣及以神入氣穴神氣不相隔礙則謂之內神通能以神大定純陽而出定變化無窮謂之外神通皆神之能事故神通即馭氣之神所顯此語人人易曉第先聖惓惓託喻顯道託喻者以神喻姹女喻離女喻婦喻妻喻我喻汞喻砂也以元氣喻嬰兒喻坎男喻夫喻彼喻金喻鉛也喻雖多不過心腎中之二物而世多援喻誑人借古者以人喻為言者便假説以女人為彼家以陰戶為鼎器以行淫為配合以淫姤久戰而誑人曰採取取男姤之穢精女姤之濁涕而吞之曰服食此廣胎息書之異説也豈可以犬馬姤後而啖遺精之事而教人乎有借古者以外丹藥喻為言者便用砒硫膽硇鹽礬硝皂雜物燒煉爐火以誑人而陰為提手行其拐騙之詐謀致道愈晦世人貪女鼎之樂以淫姤而失精反稱曰採補本催死之事反稱不死之道寧貪數年之淫樂無證果而速死不學百日築基成而得長生愈行假路愈不識性命之真宗又有世人貪求橫財燒煉爐火只學點茅假銀反稱為點化金丹意圖賺錢而得大利反遭折本而傾家愈信方士愚弄愈不識真金丹之妙藥此所以道之不明而曰愈晦故先聖又轉機而直言神氣矣喻本為明道而設言其近似邪人執喻為道而道反受害於喻矣故自我邱真人以來諸祖不得不直言神氣二者以決言道之真羣書之作或有詳言神則未有不略於氣者或有詳言氣亦未有不略於神者是亦天機之不得不祕也者奈後世又不能究竟無全悟何無完修何仙道以元神元氣二者雙修而成故説性命雙修為宜古聖詳神略氣及後世愚人不明乎氣只妄言後天呼吸之事所以不能全悟完修而成道古聖詳氣略神後世愚人不知所主者在神只妄猜修命不修性犯呂真人所言如何能入聖所以亦不能全悟完修而成道流禍至於人人易視仙道而輕談僧人小視仙道為不足證豫亦正欲均詳而直論之夫既謂氣為長生之本有命之蒂也寧不以神受長生之果者乎有性之根將謂神為修長生之主寧不以氣定長生之基者乎一日戶部郎四愚張公名學懋來沖虛子道隱齋中問曰此四句是如何説伍子答曰此性命雙修之説也氣為長生本者言先天氣即真陽之精世人耗盡此精氣則能喪命返還得此精氣則能長生所以古云氣是添年藥又云留得陽精決定長生是也我言學者要知長生之本為先天精氣當知非容易可得者必由神而馭之而得長住長生則此長生之果唯是神長住之所受用者故説受長生之果是神神為修長生主者言若不以元神主乎氣便不得真長生之元氣經云神行即氣行神住即氣住我故説修長生之主是神然神非得氣定基而長凝神入於氣穴則神墮空亡而無所長住而不能長生必得真氣為不死而後神隨之以不死雙修之理少一不得少神則氣無主宰不定少氣則神墮頑空不靈是氣也神也仙道之所以雙修性命者也西山記云雖知養性之理不悟修行之法則生亦不長雖知修煉之方不得長生之道則修亦無驗且謂今也以二氣為論所以明生人生仙佛之理也氣曰二者以其先天氣及後天氣分二體而二其用也先天必因後天而採取而烹煉而入穴凝神方能神氣合一後天必因先天則有歸依有證果還伏而寂定唯二者當並用故並論之然欲明生人之理其先後天之氣曰生身曰成身皆以順行及住世間亦皆順欲明生仙佛之理其二氣隨神而返身中皆逆用而還伏為靜定寂滅而真空若二氣不順行則人不能生二氣不逆行則仙佛亦不生藥物為論所以明脫死超生之功也人生有必老病死之理唯真精元氣為救老病死之藥物修煉之而服食之除其老病苦得不死而長生者而火候集古為經所以合羣聖仙機列為次第之宜也世人皆知聖人傳藥不傳火為見薛道光之言故也及我博觀則見聖聖皆有傳火之言但不全言而皆略即我所説略於氣者我欲全言之又不敢下口便下口言之而人未必信徵未必能用與不言等耳故集衆聖之略言者而成我欲全言之志即過去世高真上聖度世之言留為未來世聖真為常行不易之經故獨以經名永滅卻未來世言有候言無候者之偏疑耳且知衆聖皆已言之精明慎密如此非我臆説杜撰之言也真有切於度世矣喻築基論二氣漸證於不漏定息還精氣謂之築基息定精還謂之基成不漏若有漏則不能為胎神之基無漏則身可久生而為伏氣胎神之法界也借煉藥論二氣成一而不離藥不煉則金木間隔煉之者金木合一火藥適均即所謂相見結嬰兒者闡伏氣論藏之內而不馳諸外闡者前人皆祕而不言此獨闡揚直論之也外馳者氣散而神無所歸依伏者即所謂若欲長生神氣相住之説雖反覆言氣而不見其繁立一名彰一義也言後聖見名當思所以用實義勿作世間時文套語忽過論煉已者論其成始成終之在真我真我者是言已之本來面目即元神本性之別號也凡所為採藥煉藥基之築成於始者皆由煉已證本來面目之成於始者即所以修性於始也所為伏氣胎息為脫胎出神成還虛於終者皆由煉已證本來面目之成於終即所以修性於終也始終皆是本性而成仙能復真性者即仙也非真性者即非仙也乃世之愚人不知仙即是性與佛即是性同所以舉世談仙而莫知所學而亦莫有所成但仙聖始言煉已者以其有諸相對者是性之用於世法世念中而逆回者言之也終言煉神還虛者是性之無相對者獨還於虛無寂滅而言之也其實只是一個性真而已世之愚人墮於邪説外道者妄執邪見偏於談仙談佛謂仙不是性而佛是性謂佛畢竟與仙不同不信法華經所謂仙人授佛妙法如來因之成佛不信華嚴經所謂如來大仙道微妙難可知既不信佛言何必強談佛豫謂不但不知仙不知佛併亦不知自已性而徒妄言誑語以惑世自墮可惜於仙佛法海中不能見一浮漚真可憐也專言神而不見其簡操一機貫一義也元神本性主宰乎性命而雙修始也欲了命為長生超劫之基則以性而配命為修固雙修之一機終也欲了性為長生超劫運之性則以長生之命配性而為修亦此雙修之一機也此正顯明直捷全機簡而不簡者也鼎器之論見神氣之互相依此即命依性而了命性依命而了性氣依神則能化氣神依氣則能化神胎息之論密指胎其神而息其氣此又合神氣而歸其妙化於神而虛者也胎息之初煉氣以化成神即經所謂不出不入自然常住者如佛之龍宮一定七日菩提樹下一定七日仙曰胎圓佛曰滅盡定及陽神出現仙曰出神佛曰始成正覺如來出現從此皆名頓法仙曰煉神還虛佛曰虛空界盡我此修行終無有盡此皆神而虛無之極境也所以能超過天地劫運者仙佛皆要如此而後可如此語成九章道明無極復以曹老師昔為我淺説道原者發明之亦成一篇冠之直論之首先揭其大綱曹老師昔云古聖所言修行之事及我素所言者皆節目即儒家所謂人道之當然者我今再為爾淺説其道之原即儒家所謂天道之所以然者若知人而不知天也不可何也凡曰大修行非止於了此一生之事而已必要證無上之上先要知大道所以然之真而後修得證所以然之妙始可信心直行到極處不然何所往而何所證豈不誤大聖大真之大志哉我今亦揭道之原發明於篇首以示修行之總綱而道體之全已盡精微於直論又致廣大於淺説且廣大之不廢詳精微之不廢捷凡廣大之言皆止於大略唯淺説之廣大而兼詳明無疏略處凡精微之言皆近於隱祕或煩瑣唯直論之精微而更捷要無隱煩處二者全備出世而世始全仙道矣豫論説全備成書真足為世之鑒觀者雖有姦邪棍黨欺誑世之初學淺見謂妙訣不載書必要我口授方知祕法斯言固足取信於人以施邪計若有志學者必要得是書而先觀之則求道有指示而人不可欺以邪已得真傳仙道者而後觀之則有印證而可知玄妙之所以然而當然已行真仙正道而後觀者則所行與道合不合其功成不成有所考據若所聞所行合是書即可信可成若不合是書即必不可信必無可成所以孔子云夏殷之禮吾能言杞宋不足徵文不足也子思云上焉無徵不信下焉不尊不信而謂直論全書可少乎哉故陳泥丸亦云若未逢師且看詩詩中藏訣好修持雖然未到蓬萊路也得人間死較遲是也倘有不徹諸書之簡語語簡而少必不能發明至玄妙之大道學者何以得徹悟抱朴子亦云五千言雖出於老子其中不肯全舉其事誦而不得要道直為徒勞耳文子莊子尹喜之文章永無至言或齊生死為無異或以存活為勞役徂殁為休息其去神仙已千萬億里遠矣必當從此證會其全古仙佛諸書皆詳一而略一如仙書祇詳言煉精化氣以出欲界曰採取曰烹煉曰成丹曰服食至於十月之煉氣但曰守中不盡其化神之説此皆書之所簡也如佛書祇詳言禪定色界四禪之理用之以出色界即仙之煉氣轉神入定也至於欲界離欲除淫如仙之煉精化氣者但曰不除淫修禪定如蒸砂石終不成飯如來涅槃何路修證明明言淫之當戒而不言淫機身心何以得斷淫根何以無漏而成漏盡通不死之阿羅漢亦是語之所以簡也我故曰佛言詳於終而略於始所以無始者必無終仙言詳於始而略於終所以有安於成始而忽於成終者有之亦即此序所謂詳氣略神詳神略氣者我見諸書俱是如此故以煉精煉氣化氣化神而全言之又煉神還虛為超出無色界之所必由皆為從前仙聖之所略言者但曰九年面壁我乃以大定常定之至玄至妙者而厯厯全言全之又全願後之人人得與仙佛齊肩皆從此直論一書悟入有不悟諸書之隱言言隱則擬議者難以知隱即喻也如參同契之喻乾坤喻坎離如喻日月喻水火如喻彼我喻男女喻夫婦如喻龍虎喻鳥兔喻龜蛇如喻藥物喻鉛汞喻金木如喻甲庚乙辛喻丙丁壬癸喻戊己喻火候喻鼎器如此多喻即令人能以喻悟正猶且難知無奈妖人又且借喻叛正以惑學者人將何以參悟哉故抱朴子云考覽奇書既不少矣率多隱語難以卒解而意之所疑又無可咨問是也必當從此證鑽其顯人身中只有精氣神三寶為得生之本此論所説神與精祇用先天忌至後天而氣不能無先後天之二用等語説得何等顯明心印經曰上藥三品神與氣精已直言之矣百日內之理我顯言精氣神者亦遵之也養胎定神只有神氣二者胎息經曰若欲長生神氣相住已直言之矣為十月內之理我於此顯言神氣者亦祖述之也固不敢巧立幻言以為顯又不敢重立喻言而終成不顯熟計古昔諸書近於有道之世可易明易悟雖借喻言亦無害今之世傍門邪説橫行遍滿天下各立門戶借喻誑人令學者無所從由於此不可復用喻言之世不得不顯言直論以開正門闢正路接引後聖而易悟入我之願也敢不勉焉而直論之哉讀此者了然解悟後聖得直論而讀者必得頓然解悟我以四十餘年究竟之力而悟後聖不終三日徹見而徹知並解悟二經之法旨不大便益耶則其超凡入聖端在茲乎古人有一字之師有一句之師曾謂此論注巳六萬言矣不可師教未來際聖真哉即其解悟能由於此修證亦必由於此矣其因果必不昧時大明崇禎十二年己卯秋邱真人門下第八派分符領節弟子沖虛伍守陽序於南都燈市道隱齋中
