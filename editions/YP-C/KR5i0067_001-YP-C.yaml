front:
  text: 重修天仙正理書後伍冲虛真人天仙正理書成於前明天啟壬戍至崇禎十二年已卯鵲橋成渡曰增註姑蘇弟子吳澄川命梓金陵齊惠吉及南昌舊及門涂之芬輔成之板藏南都燈市西廊之道隱齋歴年旣久原板世罕覯國朝康熙八年己酉冬新建涂叔樸諸君再刻以廣其傳序之者邑進士黎博庵名元寛學使也眞人堂姪達行復敘事略於萹首康熙五十八年己亥謝君嗣芳等再刋於姑蘇老君堂汲引後學旣遷閶門外之崇壽道觀而人間遂鮮有知之者予生三十年矣每以迷昧本明悲深涕下而丹經萬卷讀之又無異荆棘中行久之恍然曰言也象也道之筌蹄也以筌蹄獲魚兎則可謂筌蹄為魚兎則不可也况大事因縁又天實定之者耶今年夏聞壯平王買癡先生韜光吳門往謁之告以度世本志先生慨然良久手一編曰此伍祖天仙正理也天不愛道此書傳世久矣子尙未之見耶急敬讀一過覺荆棘頓掃心目豁然嗚呼筌蹄誠非魚兎也廸竟具魚兎於筌蹄之中卽謂筌蹄為魚兎也嗚呼不可爰偕弟玉井友楊石互堂徧訪之旣得一本全缺道源淺說萹復請先生西江原本正之而是書始爲全璧矣夫伍祖作書距今百四十三年其間授受非易在伍祖當時亦且棄田園歴難險從師十九年而始得全㫖而如子者長於世冑德薄孽深祗以一念堅持僅五閲寒暄而已得探心源於百年之上亦何幸也因所得係老君堂原板復踪跡之始知遷於崇夀道院而淺說篇第三第四兩頁已朽蠧久矣旋倩工鐫補又增註說一篇亦係眞人自定目録中未曾載入并更定之從同志鄒君之請仍歸板於老君堂垂示久遠而自書其得書重修之由於後乾隆二十有九年𡻕次甲申金鼎滿日晉陽私淑弟子鐵蟾申兆定敬書伍真人事實及授受源流略謹按真人故明嘉靖乙卯孝廉維摩州刺史諱希德號健齋先生之季子也世居南昌辟邪里幼孤家貧力學持身高潔一介不苟取長而薄榮利篤好道德性命之言造次顛沛弗離也性至孝以母在故𡻕授生徒博館穀母九十餘而卒而先生世夀亦七十矣遂隱跡仙去所著天仙正理仙佛合宗二書掃盡旁門獨標精義誠無生之寶筏也真人爲龍門嫡嗣原序謂龍門授之張靜虛即俗所謂虎皮張真人者李虛庵師靜虛曹還陽師虛庵而真人爲還陽弟子據此則真人爲龍門四傳弟子矣問考龍門二十字派真人適當第八字即真人亦自書龍門第八泒弟子然則博庵之序果無據耶因重修天仙正理復以得之買癡先生及西江板原敘諸說緝而誌之以存什一於千百云越日鐵蟾又書
