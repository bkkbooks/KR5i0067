body:
  text: 增註說書有不必註者謂已顯明直捷反覆辨論之若有註也書有可以註者謂宜發明書言以巳意逆合而註之也必後之聞見與前之聞見同前書得後註理愈明而猶合轍若一斯可不誑惑於世矣若觀者不知作者意如註參同契爲納甲註悟真篇爲房術註楞嚴楞伽金剛法華以時文訓詁套語不能剖真修實義各成門戸致有經自爲經註自爲註之斥出乖露醜則亦何用註爲所以天仙正理直論既有仙佛合宗爲之註猶懼後人妄註錯誤害超世之聖真吾堂弟真陽子又加註之予又輔之同一師之學並四瞳之見而爲之者其合宗二註又皆出予錄者之手無非杜絶眾口之妄保全度世之真則後世不必畫足於蛇倒屣於首令未來無極劫中皆不失性命根宗不迷超劫慧命誠不謬註者之所賜也故亦誡之曰毋煩後註天仙正理論註六萬餘言統二宗之綱目具兩藏之鎻匙初不少置一言令人不明而抱恨亦不多置一字令人歧想而懷疑繼往聖以闢邪說開來學以正人心乃仙佛二宗之必不可無而聖真之必不可不參究者曩誠齋陳先生門人沈應銓謝嗣芳在蘇見鈔白各本字句互多舛錯每以不得印本較正付梓爲憾今幸同門朱鼎復崔家玉偶於虎邱舊書賈處資請墨刻而歸而嗣芳遂與善信沈之鼎等公梓之以此功德上副真人度盡當世及未來際劫聖真共證仙佛自利利人之果於無極板交姑蘇齊門内老君堂方丈黃清瑞珍藏接引後來仙佛種子時大清康煕五十八年己亥仲春也
