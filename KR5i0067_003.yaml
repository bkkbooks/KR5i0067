  text: 天仙正理直論道藏輯要天仙正理直論增注
  hash: sha256:cf5302783489743222dc21d79e061b4cd8a1fbe0f7cc38d3ffe03bf2267afec0
  markers:
  - {type: page-break, offset: 6, content: '', id: CK-KZ_KR5i0067_03p001a}
body:
  text: 沖虛子伍守陽撰并注真陽子伍守虛同注直論九章先天後天二氣直論第一沖虛子曰昔讀玉皇心印經云上藥三品神與氣精固然矣本注云人以精氣神三者以生此身亦以精氣神而養此身於世間凡從人胎生者皆如此仙與佛同是人胎中有此身心而來者故亦同修此三者而成果學仙佛者當知然其間有祕密而當直論者正有說焉祕密者先天後天之說也上古未說之祕中古聖真亦說之特未詳故後世人有遇傳者有不遇傳者有知者少不知者甚多唯是神與精也祇用先天忌至後天先天是元神元精是有變化有神通之物也後天者思慮之神交感之精無神通變化之物也而氣則不能無先後天之二用以為長生超劫運之本者真陽曰二氣者先天是元氣後天是呼吸之氣亦謂之母氣與子氣也超劫之本乃元氣不自能超必用呼吸以成其能故曰有元氣不得呼吸無以採取烹煉而為本有呼吸不得元氣無以成實地長生轉神入定之功必兼二氣方是長生超劫運之本也所以呂祖得先天氣後天氣之旨而成天仙也純陽真人初聞道而未甚精明及見入藥鏡云先天氣後天氣得之者常似醉之說而後深悟成道故真人自詩云因看崔公入藥鏡令人心地轉分明是也然所謂先天氣者謂先於天而有無形之氣能生有形之天是天地之先天也即是能生有形之我者生我之先天也天從元氣所生我亦從元氣所生故亦曰先天修士用此先天始氣以為金丹之祖未漏者即採之以安神入定未漏童真之體即用童真修法已漏者採之以補足如有生之初完此先天者也凡在欲界精已漏者遇此先天氣將動而欲趨欲界則採取烹煉還補為離欲之氣而先天依舊完足即是金丹服此金丹則超出欲界之上而成神仙天仙矣夫用此氣者由何以知先天之真也當靜虛至極時即致虛極守靜篤之說無一毫念慮念慮原是妄想心來未涉一念覺知此在不判不動之時尚在將判之先者此正真先天之真境界也佛宗所謂不思善不思惡正恁麼時與此同如遇混沌初分即鴻濛一判即有真性始覺真氣始呈是謂真先天之氣也真陽曰先天之氣藏氣穴雖有動時猶是無形依附有形而為用者始呈而即始覺尚未墮於形體之用故曰氣之真若依形體而用則旁門邪說之所謂氣者修士於此下手須要知採取真時真陽曰真時者藥生之時易知而辨所以可用不可用之真時則難知非由真仙真傳者不可得此非邪說之所謂時者知配合真法即以神馭氣之說知修煉真機而後可稱真仙道真機者總上二者皆是鼎器要真不真則真氣墮於空亡火候要真不真則明明進退之陽火而不陽火暗合進退之陰符而不陰符者不可故修煉之機要知之真而後可行可成知不真則不可行不可成所謂後天氣者後於天而有言有天形以後之物若風氣之類曰巽風者即同我有身以後有形者也若呼吸氣之類亦喻巽風者當陰陽分而動靜相乘之時此言陰陽是言太極一中分陰陽為二神氣是也陰陽俱有動靜故相乘如二分四之說今人若不信陰陽同有動靜者如睡濃時氣固靜神亦靜睡醒時氣亦屬動神亦屬動即如世法俗語便見道理自然循環是如此者有往來不窮者為呼吸之氣何故說往來不窮以呼吸在睡時也有在夢時也有在覺時也有在飲食時未飲食時皆有故曰不窮若神氣歸於元位似不見有則曰元神元氣不與睡中呼吸顯然同相及其神氣同動判然靈覺有照有應顯然不無唯聖真有修者而後有證以凡夫之呼吸者運至真人呼吸處以凡夫之呼吸窮而死者修成真人之呼吸窮而長生不死以超劫也有生生不已者為交感之精故曰後天自呼吸之息而論此言凡夫呼吸自然之理人之呼出則氣樞外轉而闢吸入則氣樞內轉而闔是氣之常度也自交感之精而論由先天之氣動而為先天無形之精真陽曰先天精氣俱是無形之稱在虛極靜篤時則曰先天元氣及鴻濛將判而已有判機即名先天元精其實本一也觸色流形變而為後天有形之精若人不遇色欲邪淫必不成後天有形之精此乃人生日用而不知是精之常理也皆人道若此而已人道者言順則為人時之道也此書篇篇皆先言順而後言逆修見其即自家所有以修自家如釋迦所謂衆生即佛之意後天而奉天者也修士於此須不令先天元精變為後天又必令先天之精仍返還為始氣即是歸於原根復還命蒂之所始氣者即虛之極靜之篤也是以後天氣之呼吸得真機而致者故於動靜先後之際即所謂如亥之末如子時之初便是用後天之真呼吸尋真人呼吸處李云只就真人呼吸處故教姹女往來飛又即張紫陽真人所謂一孔玄關竅乾坤共合成又云槖天籥地徐停息者皆是一意歸中即以神馭氣凝神入氣穴之理隨後天氣軸而逆轉闔闢元氣固要逆修而呼吸之氣亦要逆轉不逆轉則與凡夫口鼻咽喉浩浩者何異所以言真呼吸者以此當吸機之闔我則轉而至乾以升為進也當呼機之闢我則轉而至坤以降為退也乾天在上自下而上機似於吸入故曰闔曰升亦似古之言進升於乾本為採取之旨坤地在下自上而下機似於呼出故曰闢曰降亦似古之言退降於坤本為烹煉之旨然現在之烹煉又為未來採取之先機此道隱齊特言之密旨也周南餘庠友初至道隱齊問曰何為進退沖虛子言進退者亦虛喻耳其實不見有似進退何也古云子巳六陽時進陽火三十六午亥六陰時退陰符二十四此言陽時所行則曰陽火陰時所行則曰陰符皆言火也以九陽六陰多少之數言進退亦一定之數也故不似進退非漸加漸減之為進退而亦非外進內多退少為進退我故曰不似進退而虛喻進退也又按古云陰符者暗合也其周天中暗合者亦有只曰沐浴之不行火候而暗合於有火候者但不在六陰時而俱可言暗合後世人執進退二字要說進妄以自外而進於內自少而進於多又要退妄以有而退於無如王道所謂戌滅亥休之說吾故曰皆說得不似此說只以升為進降為退謂候中只有升降必要似子進陽火午退陰符從此喻說而已修煉先天之精合為一氣以復先天者也真陽曰此一段即言小周天所當用之機火候所不傳之祕在是修煉金丹之士只要闔闢明得透徹則金液可還而為丹若闔闢不明則藥不能生而亦不能採取烹煉大藥無成枉費言修世人乃不知先天為至淸至靜之稱所以變而為後天有形之呼吸者此先天也動而為先天無形之精者亦此先天也化而為後天有形之精者亦此先天也此順行之理也元氣為生身之本凡一身之所有者皆由元氣所生化至於逆修不使化為後天有形之精者固此先天也不使動為先天無形之精者定此先天也不使判為後天有形之呼吸者伏此先天也證到先天始名一氣是一而為三三而復一有數種之名即一生二二生三三生萬物之說即有數種之用故不知先後淸濁之辨不可以採取真氣真氣者即先天元精淸者也後天交感之精濁者也則不真不知真動真靜之機亦不可以得真氣虛之極靜之篤則曰真靜未到極篤旡知覺時不為真靜從無知覺時而恍忽有妙覺是為真動未到旡知覺時而於妄想中强生妄覺則非真動動既不真則旡真氣者不知次第之用次第者次藥生之真時採藥歸鼎封固進陽火退陰符周天畢有分餘象閏等用採取之工由升降之機得理則能採取得氣不然不得真氣縱用火符亦似水火煮空鐺而已又何以言伏氣也哉古人有言藥物者單以先天氣而言者也有言為火候者單以後天氣而言者也不全露之意也有言藥即是火火即是藥雖兼先後二氣而言蓋言其有同用之機藥生則火亦生用藥則亦用火故曰即是亦不顯露之意也後來者何由得以明悟耶修天仙者不可以不明二氣之真藥物直論第二前先天後天已兼火藥論矣此則單論藥之先天沖虛子曰天仙大道喻金丹金丹根本喻藥物果以何物喻藥也煉外丹者以黑鉛中所取真鉛白金煉成金丹故內以腎水中所取真氣同於金煉成內丹亦名曰金丹外以白金為藥以丹砂為主內以真氣同於金者為藥以元神本性為主故同名金丹同喻藥物太上云恍恍惚惚其中有物恍惚者是本性元神不著於知覺思慮似知覺之妙處其中便有物即吾身中一點真陽之精氣號曰先天祖氣者是也夫既名曰祖氣則必在內為生氣之根者而又曰外藥者何也蓋古云金丹內藥自外來以祖氣從生身時雖隱藏於丹田卻有向外發生之時如生視生聽生言生動生淫欲皆此一氣化生如思外之色聲香味觸法皆由氣載思以致即取此發生於外者復返還於內是以雖從內生卻從外來故謂之外藥煉成還丹斯謂之內藥又謂大藥古云鉛汞相交而産黃芽即此大藥便是黃芽實止此一氣而已今且詳言外藥內藥之理而所以名外藥內藥之由聖真學者究此一段則邪說淫風一筆掃盡矣既曰藥本一氣也非有外內之異而何有外內之名者以初之發生總出於身外而遂曰外藥若不曰外則人不知採之於外而還於內將何以還丹及精補精全氣補氣足神氣俱得定機真陽曰定機者將用大周天之先機也若小周天則不定之候故小周天有止火之候者以其不定能傷將定之藥張真人所言若持盈未已不免遭危殆之說便是於此時發生大藥者真陽曰大藥不自發生必採之而後發生不似微陽初動為自發生也然必求何以知採大藥之時知前止火之候則知即採此大藥之時全不著於外祇動於發生之地因其不離於內故曰內藥昔人每注只說氣是外藥神是內藥者不是若不曰內則人一概混求於外則外無藥無所得而阻於小果空亡此言只可長夀而非不死可超劫運者將何以化神所以先聖不得已而詳言外內也張真人云內藥須同外藥俱與此同既有外內之生所以採之者亦異蓋外藥生而後採者也純陽真人云一陽初動中宵漏汞紫陽真人云牽將白虎歸家養者是也內藥則採而後生者也自邱真人傳於張李曹三真人以及伍沖虛子所謂七日口授天機以採大藥者是也張紫陽亦謂不定而陽不生此亦往聖之不輕言直論者我今再詳言之以繼世尊所為重宣偈者云此氣在人未有此身即此氣以生其身此氣不足者則不能生子之身少者老者皆具一形少者氣足能生子老者氣不足故不生子觀此明知形不能變化生生而氣能生既有此身則乘此氣運行以自生故曰修士亦惟聚煉此氣而求長生也惟能煉則能聚煉聚久之而大藥生為能起死回生之真仙藥也但其變化雖在逆轉一氣而其為逆轉主宰則在神即神返身中氣自回之說若念動神馳引此氣馳於欲界則元神散元氣耗變為後天有形之精此精必傾有形者終有壞也不可復留亦不可復返終於世道中之物而已乃無益於丹道之物也若人認此交姤之精為藥即為邪見丹道以無形元氣為藥既已有形則不能復為無形之藥既已淫媾則氣已耗盡且千人千敗萬人萬敗何曾見有一人不敗淫精而能採來補精得長生不死者乎是以修金丹者不用淫姤之精者以其氣不足不能長生故也如遇至靜至虛不屬思索不屬見聞覺知總是虛之極靜之篤者而真陽之氣自動虛靜之極自動方是循環自然妙處非覺而動實動而覺覺而不覺復覺真玄覺而動者先覺後動也動而覺者先動後覺也即是先天宜用之藥物此時即有生化之機可以凡可以聖而將發生於外者在如天地之氣遇冬至而陽動必及春而生物者然也冬至陽初動謂之微陽孔子於復卦之大象云至日閉關安靜以養微陽陽微故不能生物亦不能為藥故順而去之即能生人逆而返之則能生仙生佛修士最宜辨此一著以先天無念元神為主返照內觀凝神入於氣穴則先天真藥亦自虛無中而返歸於鼎內之氣根即氣之穴也為煉丹之本古云自外來者如此此外藥之論也將此藥之在鼎者以行小周天之火而烹煉之俞玉吾云若知有藥而不得火候之祕以煉之唯能暖其下元非還丹也謂之煉外丹此正三家相見之謂亦回風混合百日功靈之說外丹火足藥成方是至足純陽之氣氣不化陰精便是純陽之真氣也方可謂之坎中滿者曹還陽真人口授以採大藥之景及採大藥之法者正為此用也還陽真人云有可採大藥之景到便知藥成而有大藥可採景不先到藥未成也夫採之而大藥生而來斯固謂之得內藥矣或有採之而大藥不生者有三故焉一者或外丹已成從初陽之微而修補至於真氣純陽謂之外丹成而採此藥之真工不明而不知所以採之故不得此由學者志不大心不堅前修功行少今修福力薄仙師只傳以補精築基之功特小成其長生之果者二者或小周天之火傳之真而行之不真而外丹不成雖知採之而無藥可採故不得此即馬真人門下弟子問我行道三年尚道眼不明是何故真人曰行之不精三者火傳之真行之真而候不足老師昔云火有止候到方是火足藥成候不足止景不到必不可止火而藥氣不至於純陽雖知採之而藥不為之採故亦不得藥之不可得則不得曰內藥也此三者總言採藥之不得即是道之不成示此以為學者自勉可不知所懼哉採得此藥以服食而點化元神張紫陽謂之取坎填離正陽真人謂之抽鉛添汞祇皆言得此內藥也欲將此氣煉而化神必將此氣合神為煉古云煉氣化神後人不知如何言化神氣人所自有者氣因淫姤而消耗神因淫欲而迷亂故皆不足而漸趨於死真人修煉先以神助氣煉得氣純陽而可定後以可定之氣而助神神氣俱定氣至無而神至純陽獨定獨覺即謂氣之化神也可煉作純陽之神則有大周天之火候在焉仙家稱為懷胎為胎息言如在胎時自有息而至無息佛謂之四禪定華嚴經云初禪念住二禪息住三禪脈住四禪滅盡定是也當是時也火自有火而至於無火藥自有藥而至於無藥自純陽氣之無漏以成純陽神之無漏而一神寂照則仙道從此實得矣皆藥之二生之真兩採之真兩煉之真以所證者辨藥者為仙家之至要祕密天機學者可不知辨哉然古人但言藥物而不言辨法不言用法又不言採時採法一藥之虛名在於耳目之外故後人無以認真我且喻言之如一草一木之為藥佛有藥草之喻者有生苗之時有華實之時自一根而漸至成用者如此真陽之藥自微至著採而用為修煉者亦如此即初九潛龍勿用及九二見龍利用之說我所以直言此論者正以申明古人所謂藥生有時令人人知辨而知用也世人見此論而信不及者則將何處得真陽將指何者為真藥物哉吾願直與同志者共究之慎毋信邪說淫精不真之藥物為誤也鼎器直論第三沖虛子曰修仙與煉金丹之理同聖聖真真無不借金丹以喻明夫仙道仙道以神氣二者而歸復於丹田之中以成真金丹以鉛汞二者而烹煉於爐鼎之內以成寶故神氣有鉛汞之喻而丹田有鼎器之喻也是鼎器也古聖真本為煉精煉氣煉神所歸依本根之地而言也世之愚人遂專於煉鉛煉汞而墮棄其萬劫不可得之人身愚人不知身中先煉者為外丹服食執鼎器之說只信煉鉛汞金石外藥為服食不死至失人身而不能救此鼎器之說誤人亦甚矣妖人淫賊遂妄指女人為鼎指淫姤為煉藥取男淫精女淫水敗血為服食誑人自誑補身接命遊方之士及一切居家愚人以女人為鼎器以淫姤為煉接命之藥取男泄之淫精陰戶出之淫水經後之敗血從廣胎息書之說皆服食之為接命不死夫世法中猶慎於淫姤淫姤傷多者為房勞之病而死隨之矣正損身喪命之事反誣曰補身接命且食有形之物同飲食入脾肚出二便即令淫精淫水食之亦入脾肚出二便飲食不能旡死精與水亦不能旡死假使食精與水可旡死食尿屎為自已所出者亦可無死乎故鍾離云若教異物堪輕舉細酒羊羔亦上升是也此皆由鼎器之說不悟者而誤棄其性命本自有之真宗性即元神命即元氣是我生身本來之所自有者神外馳為淫想氣外馳行淫事皆所以速死者真人以神馭氣同歸於氣穴根本處禁之令久住於中而不可出以此禁固之義亦曰鼎器盡由鼎器之說誤之也一鼎器之名而迷者與悟判塗敢不明辨而救之哉夫是鼎器也為仙機首尾歸復變化之至要者也首尾者煉精化氣煉氣化神也既用火候為烹煉必有鼎器為封固既以神氣歸於丹田之根則丹田便是鼎器方有妙用若無此為歸復之所而持疑無定向則神何以凝精氣歸穴耶然鼎器猶是古來一名目也凡有一虛名者必有一實義故世尊所說欲明佛法每借權顯實仙家每有言皆欲顯實故真仙真喻者固多而邪說混入邪喻者更甚不知身中所本有者有乾坤爐鼎之喻乾為上田亦天在上坤為下田亦地在下故中和集所說亦有天地為爐鼎者曰鼎鼎原無鼎者亦有內鼎外鼎之稱者有稱金鼎銀鼎者鉛鼎汞鼎者水火鼎硃砂鼎者言外鼎者指丹田之形言也佛喻曰法界修行佛法之界也言內鼎者指丹田中之氣言也佛喻曰華藏曰寂光國土以形言者言煉形為煉精化氣之用故古云前對臍輪後對腎中間有個真金鼎者是也仙道神馭氣之必歸於此安止於此禁之不令外動故鼎器關煉鉛汞者似之以氣言者言煉氣為煉氣化神之用故古云先取白金為鼎器此旌陽真君之說也古以黑鉛喻腎腎中發生真氣取之而喻曰取白金有此白金之元氣是得長生超劫運之本方安得元神住亦以長生超劫運故曰先取為鼎器以還神也又曰分明內鼎是黃金白金內有戊土之黃色故亦稱曰黃金與上喻同言白言黃皆言所還之氣是也茲再擴而論之無不可喻鼎器者當其始也即初關煉精化氣時欲還先天真氣惟神可得則以元神領氣並歸向於下丹田而後天呼吸皆隨神以復真氣即借言神名內鼎者也可若無是神則不能攝是氣而所止之下田為外鼎者又氣所藏之本位即所謂有個真金鼎之處此言丹田既為外鼎則神亦可為內鼎也必凝神入此氣穴而神返身中氣自回真氣陽精發生時必馳於外者故欲其返回神知氣之在外則神亦馳在外亦欲返回者當其氣之在外而神亦隨之在外及神返身中氣亦隨之返於身中故曰神返身中氣自回也氣所以歸根者由此也及其既也欲養胎而伏至靈元神即中關煉氣化神時惟氣斯可人生在世間惟是氣載神修仙出世間亦用氣載神則以先天元氣相定於中田參同契云太陽流珠常欲去人忽得金華轉而相因又佛家六祖盧能云心是地性是王王居心地上性在王在性去王無之說皆是似為關鎖而神即能久伏久定於中太上云轉神入定即如前言氣名內鼎者也可若無是氣即墮孤陰之說則不能留是神神無所依著則出入無時馳為視聽言動之妄若依氣為念則無向外妄念矣而所守之中田為外鼎者又神所居之本位故神即靜定而寂照者如此也初煉精化氣固以神為氣之歸依及煉氣化神又以氣為神之歸依神氣互相依而互相守緊緊不得相離真可喻鼎器之嚴密一般盡皆顛倒立名以闡明此道耳故呂仙翁又曰真爐鼎真槖籥知之真者而後用之真用之真者而後證果得其真豈有還丹鼎器之所當明者而可不實究之耶此又結言自身有還丹鼎器之當究又豈有取諸身外而可別求為鼎器者耶此又結言泥土金鐵鼎器及女人假稱為鼎器者俱不可信信之則必誤喪性命昔有言總在氣聖性靈而得者斯言亦得之矣白玉蟾云祇將戊已作丹爐煉得紅丸作玉酥蓋戊為腎中氣名白金者曰戊己即心中之本性曰已戊已原屬土故曰土釡即鼎器之別喻也張紫陽曰送歸土釜牢封固是也夫還神攝氣妙在虛無虛無者乃真先天神氣之相也神旡思慮氣無淫姤必先有歸依神依氣氣依神神氣相依而又依中下之外鼎方成勝定勝定者最上乘至虛至無之大定也古云心息相依久成勝定此鼎器之辨不可忽也火候經第四沖由子集說火候經諸篇皆論此獨名曰經者皆古高真上聖傳於永劫真常不易之經語也曰天仙是本性元神仙由修命而證性故初關是修命中關是證性不得金丹不能復至性地而為證金丹是真陽元氣不得火候不能採取烹煉而為丹故曰全憑火候成功吉王太和重問火候沖虛子集聖真諸言而為此經意曰古仙聖真皆不傳火雖有火記六百篇篇篇相似採真鉛玉皇心印經曰三品一理妙不可聽觀此言雖曰不傳似亦傳之矣雖曰傳之又似不傳矣我每亦遵之不敢傳火及見見在世人人惑於妖妄邪淫個個不知仙道正門乃懼未來聖真無所趨向故又不敢不言言之簡而人亦不徹悟猶之夫舊事也言之詳又嫌於違天誡因世人於古云火有候有作為此言若先入心便責彼言旡候旡作為者為非於古云火旡候旡作為此言若先入心便責言有候有為者為非竟不知當有候有為我亦當有當旡候旡為我亦當無所以紫陽真人嘆云始於有作無人見及至無為衆始知但信無為為要妙孰知有作是根基昔禪宗人亦云你有一個拄杖子我與你一個拄杖子你無一個拄杖子我奪卻你一個拄杖子即此說也我故全集衆仙真祕訣而次第之說破逐節當有當無直指世之愚迷遇師時當以此為參究昔我李祖虛庵真人云饒得真陽決志行若無真火道難成周天煉法須仙授世人說者有誰真此言仙道必要仙傳而後可修成仙俗諺云要知山下路須問去來人若世人所傳者只是世法甚非仙道古仙云若教愚輩皆知道天下神仙似水流彼自己尚無學處將何以教人前七句是必用真火候之斷此四句是必用真火候引證之案以斷案破其題且謂上古聖真不立文字恐人徒見而信受不及今世人亦不信書以書正不作巧言故不足取信於人唯邪人能造巧言故能取信於人中古聖人借名火候而略言之而世又不解知及見薛道光言聖人不傳火遂委於不參究雖有略言者亦不用競取信於妖人之口而已我故曰火候誰云不可傳既不可傳何故有火記六百篇隨機默運入玄玄達觀往昔千千聖呼吸分明了卻仙此直言說出火候只是呼吸二字豈不見陳虛白曰火候口訣之要當於真息中求之靈源大道歌云千經萬論講玄微命蒂由來在真息此又直說出火候只是真息真息者乃真人之呼吸而非口鼻之呼吸陳致虛曰火候最祕其妙非可一概而論中有逐節事條即我張李曹三真人相傳以來所云採藥之候封固之候起小周天之候進退顛倒之候沐浴之候火足止火之候採大藥之候得大藥服食之候大周天之候神全之候出神之候等皆是可不明辨之乎張紫陽曰始於有作無人見及至無為衆始知但信無為為要妙孰知有作是根基有作者小周天也無為者大周天也蓋火候行於真人呼吸處此處本無呼吸自無呼吸而權用為有呼吸以交合神氣久煉而成大藥者必用有為也不如是則道不真無人見者祕傳之天機而密行之古先聖真誡人曰知之不用向人誇是也所謂聖人不傳火者不輕傳此也世人邪法皆用有為仙家之有為則不同邪說之有為皆著相仙家之有為不著相此尤為無人見者此以前皆從旡入有也以後皆從有入旡也然呼吸本一身之所有也先自外而歸於內則內為有故大周天必欲至於無然無者非不用火而言無乃是火候行之妙於無者此火危險甚大因有為之火易行無為之火難行也不能無之是危險能無之而或少有一毫雜於有亦是危險無之而或間斷不行亦是危險故紫陽亦囑之世之愚人俗子但聞無為便猜為不用火遂其所好安心放曠者有之或猜為始終只用一無為而已不求所以當有為於始者有之故曰但信無為孰知有作此紫陽甚言當有無雙用之旨也純陽真人曰一陽初動中宵漏汞此下一段皆言活子時之火候魏伯陽真人曰晦至朔旦震來受符此以一月為喻也晦者月終之夜無光喻身中陰靜之時晦而至於次月朔旦者初一也震來者震一陽動於下爻以喻身中真陽精氣之生蓋藥生即火當生震陽既動而來則當受火符以採取烹煉之也上節純陽之說以一日為喻者中宵為夜之半即子時之義漏汞者火符之刻漏籌數也古人或以日喻或以月喻或以一年喻無所不喻不過借易見者以發明火之不可言者學者皆不可以喻認真但恍忽喻似身中之理而猶非實似也陳朝元曰即玉芝書凡煉丹隨子時陽氣生而起火則火力方全餘時起火不得無藥故也有藥方能造化生故起火煉藥無藥時不必用火故起火不得若强用火便是水火煮空鐺鐺是炊飯器陳泥丸曰十二時辰須認子丹道一周天之用須用真活子時而起火天道一日十二時本有子夜半之時也丹道雖喻子而非可執按其子者於此十二時中皆可有陽生火生之子故稱曰真活子時為其不拘夜半之死子也修丹者當於天時中認取丹道當生火之活子時若不知活則謂當面錯過白玉蟾曰月圓口訣明明語時子心傳果不訛月圓則陽光盛滿喻陽氣發生之盛可採取煉之而可成金丹仙機採有時者即此若不及圓則陽不旺採之亦不成丹亦不能長生不死故千叮萬囑要知時時子者身中陽生之子時必得仙師心傳口授而後得其時之真彭鶴林曰火藥元來一處居看時似有覓時無藥是先天元氣本無形若以無形而致疑曰不知有所得無所得是終於不得成我則信其無之至真亦以無之妙用而採取烹煉便是真虛無之仙道也火本呼吸之有形若即以有形用之則長邪火以有而用之似無火藥一處居俱於無中得有之妙所以謂之似有似無豫老祖師李虛庵真人曰一陽動處初行火卯酉封爐一樣溫一陽動同純陽之說但曰採取封固曰沐浴溫養總要無有雙忘同於太虛此皆言藥生即是火生以明採藥起火之候也此是沖虛子總結上一大段之說者採藥者子時火之前也起火者子時火之事也二者必要分明所以達摩云二候採牟尼四候別神功是也正陽真人曰結丹火候有時刻此下皆言從起火於子行十二時小周天火候正烹煉金丹之候故曰結丹有時刻蕭紫虛曰乾坤槖籥鼓有數槖籥者鼓風吹火之具喻往來呼吸之息即乾呼而坤坤吸而乾之義有數者即乾用九坤用六之數也離坎刀圭採有時離心中之神曰己土坎腎中之氣曰戊土上下二土成圭字戊己合一者稱刀圭以喻神氣合一者亦稱刀圭然刀圭由得二土合煉而成又必先知採取二土之時方能成二土之圭不知採時必不成二土之圭也王鼎真人曰入鼎若無刻漏靈芽不生時候不正有何定其斤兩升降哉真陽曰入鼎者真陽之精氣既還於氣穴必要刻漏之火候煉之則黃芽大藥方生有刻漏則知一時已完當用二時六陽用進六陰用退方合正理又能令神氣二者皆半斤八兩又如用一時之刻漏當升當降者不當升降者方有定理玄學正宗曰刻漏者出入息也此直言刻漏是出入息之別號刻漏者是晝夜十二時各有刻數每有幾點漏滴之聲以應一刻再至多漏以應一時今言此以喻呼吸之息也以漏數定刻數即如丹道中以真息數定時數也廣成子曰人之反覆呼吸徹於蒂一吸則天氣下降一呼則地氣上升我之真真相接也黃帝於崆峒山石中得陰符經請問文義於天真真人及廣成子記其言曰三皇玉訣云反覆者上中下三田旋轉之義呼吸者真真之呼吸非凡夫之呼吸徹於蒂者通於氣穴之處吸降呼升者似於反說大抵丹書反說者甚多我以理及事詳究之皆吸升呼降合於自然方得可有可無之妙豫師曹還陽真人曰子卯午酉定真機顛倒陰陽三百息子卯午酉者入藥鏡所謂看四正者即此四時也入藥鏡所言在脫胎大周天之後也此言乃小周天也小大事不同而用同何也心印經云三品一理是也我北真孫不二所言無內藏真有有裏卻如無即此真機也顛倒陰陽者六陽時用乾之用而進至六陰時則用坤之用顛倒之而退陽時乾策二百一十六除卯陽沐浴不用乾用實一百八十也陰時坤策一百四十四除酉陰沐浴不用坤用實一百二十也合之得三百息周天之數也閏餘之數在外張紫陽曰刻刻調和真氣凝結刻刻言三百六十息皆要調和合自然一刻不調則不能入定凝氣而成胎基薛道光曰火候抽添思絶塵一爻看音刋過一爻生抽添即進退絶塵者念不著於塵妄幻魔爻過爻生者即綿綿無間也陳泥丸曰天上分明十二辰人間分作煉丹程若言刻漏無憑信不會玄機藥不成天上明明有十二支之辰位真人效此為十二時之火候程者一周天節制之限數也若愚人不知始用有作言刻漏不必用便是不會悟玄妙天機之人既不用火煉藥則藥不成無以證道升仙也又曰百刻之中切忌昏迷一日十二時中有百刻以足周天者昏迷者或昏睡或散亂皆錯失真候故曰切忌陳希夷曰子午工是火候兩時活取無昏晝子午皆活用比喻的非若天時之晝午夜子一陽復卦子時生午後一陰生於姤三十六乾用九故四九三十六也又草四坤用六故四六二十四也周天度數同相似天上度數之周天與煉丹火候之周天皆相似同此九六之數卯時沐浴酉時同二時同用沐浴火候足時休恣意崔公云火候足莫傷丹言不宜恣意行火而不知止也許旌陽曰二百一十六即乾用九之積數用在陽時從子至巳六陽之時也六陽時虛擬之曰二百一十六此大約言者有卯沐浴無數之候在中本無此數一百四十四行於陰候即坤用六之積數用於陰者從午至亥六陰之時也每四六計之總六陰而虛擬一百四十四也非真實用此數但言有如此之理學者當因此粗迹而求悟精義之妙金谷野人曰周天息數微微數玉漏寒聲滴滴符微微數者精妙不著於相非强制也滴滴符者周天之數無差真詮曰火候本只寓一氣進退之節非有他也真火之妙在人若用意緊則火燥用意緩則火寒勿忘勿助非有定則尤最怕意散不升不降不結大丹此是明時初學者之說雖未明大道之人其言亦可示學者為教誡者王果齊曰口不呼鼻不吸槖天籥地徐停息巽風離火鼎中烹直使身安命方立口鼻不呼吸則循真人呼吸之法而呼吸之槖籥者即往來呼吸之義槖天籥地即廣成子呼地升吸天降之說停息者不呼吸之義也邪正皆言停息採戰者曰切須先學停其息胎息廣義妖書亦論停息實無所用處特借此以擒拏愚人令尊己歸依己耳况停又為强閉强忍之邪法實非停也仙家之停息乃自然靜定而寂滅也唯仙佛同鼎中烹呼吸在真金鼎之處不出入於口鼻則內有真寶丹成於此本性元神安立於此謂之築基成者陳泥丸曰行坐寢食總如如唯恐火冷丹力遲行坐者坐而行工也非行路有寢有食尚未脫凡夫只是百日內事若十月胎神之工則不寢不食矣如如者入定之妙似有而不著相不空而空似無而不著空空而不空謂之真如真如如則火合玄妙火不冷丹力不遲矣純陽老祖曰安排鼎竈煉玄根進退須明卯酉門鼎竈者即氣穴玄根者即元陽精氣歸於根而煉之鼎竈玄根皆言用火候之處須明者叮嚀之意言人不可只用陽進火陰退符而不用卯酉之沐浴則亦墮空亡而不得藥不能成藥蓋沐浴是成仙成佛最緊要最玄妙之工故世尊有入池沐浴之喻沐浴乃是煉丹之正工而進火退符不過只是調和助沐浴之工而已調和進退而不沐浴則進退成虛幻沐浴而不進退則沐浴不得冲和故曰須明禪家馬祖曰未有常行而不住未有常住而不行亦喻此也正陽老祖師曰旦暮寅申知火候本卯酉二時以行沐浴純陽翁巳直言之矣其師正陽翁曰寅申者寅之下即卯申之下即酉戒修士至寅申之候不可忘失卯酉之沐浴也又曰沐浴脫胎分卯酉沐浴之工固行於卯酉之候及脫胎亦同於卯酉入藥鏡謂終脫胎看四正即此語脫胎之沐浴曰分者前似有而後似無也人人不泄煉氣化神之工唯正陽翁於此泄萬古之祕又曰沐浴濳藏總是空沐浴而真空名曰仙機不能真空則墮旁門强制外道而亦成大病悟真篇注疏曰子進陽火息火謂之沐浴午退陰符停符亦謂之沐浴停符二字亦可發明正陽老祖曰果然百日防危險小周天有進退之火有不進不退之火若進退不合進退之數不合進退之機不由進退所當行之道不合進退之所當起止已合已由不知火足之當止皆危險所當防者蕭紫虛曰防火候之差失忌夢寐之昏迷火候差失則真氣不能補足而大藥不能成夢寐昏迷者或睡中迷於夢則塵妄心生而不能生正覺或行火迷於昏睡無周天之候皆所當防當忌者天尊得道了身經曰調息綿綿似有如無莫教間斷息不綿綿則不謂之調無不似有有不如無則亦不謂之調有間斷則亦不謂之調張紫陽曰謾守藥爐看火候但安神息任天然神息任天然似大周天之火其實上句藥爐則是言小周天矣但煉藥爐中之火雖屬有為畢竟要合天然自在為妙不如是則非仙家真火真候乃外道邪說之火矣石杏林曰定裏見丹成石之師紫陽云惟定可以煉丹不定而丹不結此甚至要之語因是總言故不入此正文大字紫陽曰火候不用時冬至不在子及其沐浴時卯酉時虛比虛比二字總貫串四句不用時者不用厯書一日十二之時而用心中默運十二時而虛比也冬至者是人自身中陽生時候虛比曰冬至故身中陽生時必要起子時之火即稱生之時為子不在天時仲冬子月之子也於一日十二時中遇生皆可言子在沐浴當行之時虛比於卯酉卯在六陽時之中酉在六陰時之中調息每至於六時之中可以沐浴矣故古聖遂稱之曰卯酉豈可誤執天時之卯酉哉又曰不刻時中分子午無爻卦內定乾坤一日每時有八刻不刻之時是心中默運火符之時虛分子午不用有刻之時也每卦有六爻易也身中借乾坤虛比鼎爐故言無爻此皆言煉藥行火小周天之候也此一句是沖虛子之言總結上文衆聖真所言百日所用之火也吉王太和問曰古來言火候者多何以分別此名小周天為百日煉精化氣之用伍子答曰小周天者有進退有沐浴有顛倒有周天度數凡言煉藥煉丹守爐看鼎藥熟丹成皆百日小周天之事故據此法而分別言小後之聖真善學者凡見大藏中所未見者皆當以此法分辨要知前聖必不以無用之言而徒言之心印經曰回風混合百日工靈回風者回旋其呼吸氣之喻也混合者因元神在心元氣在腎本相隔遠及氣生而馳外神雖有知而不能用者無混合之法也故此經示人用呼吸之氣而回旋之方得神氣歸根復命而混合之方得神宰於氣而合一倘無回風之妙用則神雖在宰氣亦未知氣曾受宰否此為煉金丹至祕之至要者若用至於百日之工則靈驗已顯氣已足而可定神已習定久而可定故小周天火回風法之所當止也自此以下皆言小周火足當止正陽老祖曰丹熟不須行火候更行火候必傷丹火足而丹熟不用火矣故有止火之候遇止火之候一到即不須行火矣若再行火亦旡益傷丹者丹熟則必可出鼎而換入別鼎若不取入別鼎則出無所歸不傷丹乎精化氣於氣穴氣化神於神室故曰別鼎崔公曰受氣足防危凶火候足莫傷丹氣足受補法而氣足亦宜防滿而溢之危險防者見止火之候而即止之則不傷丹而得防之功何為滿而溢我亦不至有此老師曾囑曰當不用火必勿用你若用火不已丹之成者更無所加疑而怠慢但已滿之元精防其易溢而非真有溢也以其尚未超脫離此可溢之界耳此正可凡可聖之分路頭也紫陽曰未煉還丹須速煉煉了還須知止足若也持盈未已心不免一朝遭殆辱未煉還丹之時一遇丹藥即當速煉用一周天之火藥生即採煉勿虛負藥生曰速煉採得藥歸而煉火候明白不差誠心勇心行之亦曰速煉如此藥也真火也真速煉必速成丹成火足必要知止而止若任丹成至足之氣持此盈滿未知止火而止終限於小成尚未脫生死輪回之欲界知止火採得大藥金丹而超脫之則行向上轉神入定斯免生死之殆蕭了真曰切忌不須行火候不知止足必傾危真陽曰老師曹還陽真人自云曾親見此事來故深為我弟兄二人詳囑之同問師前煉丹時也知止火採得大藥衝關特未過耳今復為之熟路舊事不異何得有此傾危老師曰當初李真人傳我時言藥火之最祕最要者盡與你明之矣即可修而成但關之前有五龍捧聖之法是至祕天機非天仙不能傳非天仙不得知非天下之可有非凡夫之敢聞待你百日工成止火採大藥時方與你言之及師回師家我居我室相去日遠我猛心奮勇決烈為之那怕仙不能成天不能上行之五十日而丹成止火採大藥而得藥自知轉上衝關而不透乃思採戰房術我所知甚多皆言過關若得一法試而透過也省得待師來遂將前邪門旁法所聞一一試用絶無可透始知邪門之法盡是欺人妄語而無實用者及年終師來我詳細欣於師師曰真好決烈仙佛種子真到此地你今所說見的內有此一景我未曾與你說得同於李老師所言你今真到即能言也可近來聽受捧聖之法我聞已亦即行之行不數日止火景到恨不即得之為快即採之大藥不來火尚未甚足也如邱真人所謂金精不飛者是也再採再煉而止火之景又到疑之曰初得景到而止火採之而不得大藥且待其景到之多而止大藥必得矣至四而遇傾危之患我想尹淸和真人云老師邱真人當止火時而長安都統設齊受食已而未及止火至晚走失三番謂之走丹前工廢矣須從新再煉乃泣曰我自福小敢不勉哉奮勇為之後即成天仙今我既在其轍敢不繼芳踪乎亦奮勇為之又思我初煉精時得景而不知猛吃一驚而已及再靜而景再至猛醒曰師言當止火也可惜當面錯過又靜又至則知止火用採而即得矣是採在於三至也今而後當如之及後再煉不誤景初而止失之速不待景至四而止失之遲不速不遲之中而止火得藥衝關而點化陽神凡真修聖真千辛萬苦萬萬般可憐煉成金丹豈可輕忽令致傾危哉凡聖關頭第一大事吾弟兄垂淚而詳述邱曹二真人之案為七真派下後來聖真勸誡即此便是止火之候大有危險之所當知者學者不可以為閒言而忽之是你自己福力此皆言丹成止火之候也此一句是沖虛子之言總結上文此一段止火之說也從來世人學道者並不知有止火之候雖有前聖多言皆忽之而不究故今特列類而詳言之故陳致虛亦有云火候者候其時之來候其火之至看其火之可發此火候也慎其火之時到此火候也察其火之無過不及此火候也明其火之老嫩溫微此火候也若丹已成急去其火此亦候也陳致虛前已言其妙非可一概而論中有逐節事條可不明辨之乎此又詳列其條以明申前旨學者最當參究天仙九還丹火之祕候宜此若此數者煉精化氣之候備矣此又是沖虛子總結前採取烹煉止火等旨百日關內事止此令學者知參究前聖之說此以下豫故曰起之舍也句止又沖虛子自言百日關內之火候等祕機而總言之者豫故曰自知藥生而採取封固運火周天其中進退顛倒沐浴呼噓行住起止工法雖殊此即同致虛逐節事件之說真機至妙在乎一氣貫真氣而不失於二緒一神馭二氣而不少離於他見三百周天數猶有分餘象閏數一候玄妙機同於三百候方得氣歸一氣神定一神精住氣凝候足火止以為入藥之基存神之舍也此一段又沖虛子列言百日煉精用火細微條目而精言實悟之旨也蓋小周天是煉精時火候之一總名也其中事理固多前聖固有各言其採藥是一候而封固又一候達摩亦只言二候採藥者并採封二者而混言也又言四候別有妙用者乃小周天三百六十內之候也我今遵仙翁而二言之及周天時言進退候者若不似進退而亦虛擬之為進退鉛汞丹法言進退者進則用火入爐退則不用火而離爐此實可據而易言或以加多為進減少為退亦可據而易言煉精者則不似此說我今亦只勉强而虛比不似以為似意謂六陽時以乾用九數之多為進六陰時以坤用六數減少為退既在周天之內進陽火退陰符非多少為言則不可若以用不用為言則遠甚矣顛倒者除藥物配合顛倒不必言但言火候中之顛倒呂仙翁云大關節在顛倒初老師言六陽火專於進升而退後隨之而已六陰符專於退降而進又後隨之而已曰專者專以進升主於採取專以退降主於烹煉也曰後隨者順帶之義以其往來之不可無亦不可與專主並重用也此聖真祕機之顛倒也沐浴者子丑十二支次第之位凡世法有五行故內丹有五行之喻五行各有長生之位寅申巳亥是也火生於寅水生於申金生於巳木生於亥卯酉子午之位是沐浴之位故丹法活子時之火厯丑寅至卯所當行之火借沐浴之位而稱火工曰沐浴酉亦如之舉世愚人邪棍尚不知沐浴何以得名何由以知沐浴之義之用哉今此只略言捷要耳更詳於仙佛合宗語録中觀此者可自查語録以考其全機行住起止者行則仙佛二宗之喻也住則仙佛二宗之丶喻也起則採封二候之後小周天候之所起也止則小周候足而止火也一氣者呼吸之氣貫串真氣自採至止不相離離則間斷復貫則二頭緒矣此由昏沉散亂之心所致甚則二三四緒皆無成之火矣戒之戒之然以息氣串真氣必主宰用一神馭之而不離若內起一他見則離若外著一他見則離離則無候無火矣焉能氣足氣生三百六十度故曰周一天猶曰五度四分度之一所謂天度之分餘為閏位者非耶知有閏則知天之實周矣能實周則氣易足丹易成而初生之藥亦易生矣玄機者不傳之祕機也火候一一皆要用此若不用此則火必不能如法呼吸則滯於真息而近凡夫之口鼻重濁而為病不用此則神亦不能馭二氣而使之行住得其自然一息如是三百息亦皆如是方可得天然真火候之玄功此古聖真皆隱然微露而不敢明言者亦不敢全言者不如是雖曰已周天近於邪說之周天亦無用矣所以玄妙機三字又百日關煉精火候之樞紐也採封煉止等候俱不可少者於一氣之外馳欲界為淫姤之精為視聽言動成淫姤之助皆能復歸於一氣能真不動同於無情不動一神之動為淫姤之神著視聽言動為淫姤之助者不馳外而復歸一神能真入大定所得候足火止而基成如此汞為入藥之基址為存神入定之宅舍此正所謂先取白金為鼎器者是也而道光薛真人乃有定息採真鉛之旨既得真鉛大藥服食正陽謂之抽鉛大藥者即陽精化氣之金丹也果從何來而得亦從丹田氣穴中生出當未化氣之先所生也出丹田但無形之氣微附外體為形曹老師因後有大藥之名便稱此為小藥之名以其氣小故也及煉成金丹既化氣之後所生也出丹田曰大藥實有形之真氣如火珠亦是從無而入有也黃帝曰赤水玄珠一曰真一之水曰真一之精曰真一之氣曰華池蓮華曰地湧金蓮曰天女獻花曰龍女獻珠曰地湧寶塔又曰刀圭曰黃芽曰真鉛如是等仙佛所說異名不過只一丹田中所生之真氣既成自有之形所以不附外形而唯生於內用於內亦我神覺之可知可見者及渡二橋過三關皆可知可見此所以為脫生死之果從此便得其有真驗矣即行火候煉神謂之添汞此火候是大周天也添汞者心中之元神名曰汞凡人之神半動于晝而陽明半靜于夜而陰昏昧陽如生陰如死修士必以昏昧而陰者漸消去之故消一分陰令陽添一分去二分三分四分五分陰則添二分三分四分五分陽漸漸逐分掙到消盡十分陰添足十分陽謂之純陽純陽則無陰睡謂之胎全神全所以古人云分陽未盡則不死分陰未盡則不仙此皆添汞之說也然所謂添者必由於行大周天之火有火則能使元氣培養元神元神便不能離二氣而皆空皆定直至神陽果滿若不添汞行火以神馭火神不陽明如何行得火添得神三分五分陽明方行得三分五分火故曰添汞行火唯神明則得二氣而培養元神助成長覺則真氣斷而不生正是不定而藥不生之說此時乃實證長生不死之初果矣若不煉神則陽神不就終於尸解而已煉神者煉去神之陰而至純陽全無陰睡火定氣定而神俱定俱空方是陽神成就煉神之法全由二氣靜定同之入滅但二氣少有些兒不如法則神不煉陽不純不成就不能出神但在十月之內不曾出定者俱是尸解之果何故但有凡夫之呼吸即有凡夫之生死人之生只有口鼻之氣以為生最怕水火刀兵水入鼻而至內則無呼吸之竅身雖壞而神或不壞亦分解形神為二火燒身則神旡依住亦分解形神為二刀兵截其頸呼吸斷神乃去形而分解為二形既無則神不獨立亦不能久立再去投胎轉劫所謂尸解者有死生之道也不行大周天之過也二氣及神皆不入定之故也丹既成生既長安肯不入一大定哉後學聖真勉之故九轉瓊丹論云又恐歇氣多時即滯神丹變化此三句是沖虛子引足上五句之意自而道光至變化止十三句又沖虛子於此承上起下分判聖凡至要天機歇氣者歇周天火候之氣或得坎實來而點離中之陰勤勤點化離陰為純陽若既得坎實而點離陰矣不即行大周天則坎實亦不勤生以點離或行大周天而不合其中玄妙天機猶之不行也亦不能勤生坎實以點離陰便遲滯離陰之神為純陽之變化神丹者即坎實曰金丹既點離則二氣漸化神二氣盡旡真有神之靈覺在故亦曰煉氣化神純陽真人云從今別鼓沒絃琴別鼓者另行大周天也明說與前小周天不同沒絃琴者無形聲之義然大小固不同行火者必先曉得清白而後可以言行火紫陽曰大凡火候只此大周天一場大有危險者切不可以平日火候例視之也上世只說周天未分大小紫陽言此大周天不可以平日的一例看則平日的便隱然言是小的平日者平常已行過的口氣不可一例看便是候不同言平日即是言百日事故仙翁又言始有作小周也後無為大周也廣成子曰丹竈河車休矻矻音恰鶴胎龜息自綿綿言不必用河車者是百日之事已過故不必用今當十月之工只用鶴胎龜息綿綿然之火也上淸玉真胎息訣云吾以神為車以氣為馬終日御之而不倦前百日以陽精轉運稱河車此胎息時則轉神入定以神為車以氣為馬以御神車是喻煉氣以化神後聖亦須分辨著白玉蟾曰心入虛無行火候入虛無是神氣入定而不著相邱真人所說真空是也雖行大周天不見有大周天之相便得虛無之妙范德昭曰內氣不出外氣不入非閉氣也世人言閉氣者强制也强忍之不令出入邪法旁術皆是如此故仙道別有天機不與世同雖內不出外不入非强忍也有真息合自然之妙運者所以入定白玉蟾又曰上品丹法無卦爻世人見此說上品丹無卦爻便一概貶有卦爻者為非不想自己不遇聖真傳道不知有爻旡爻將何所用蓋小周天者化氣是有卦爻小成之火大周天者化神是無卦爻大成之火以其化神故曰上品彭鶴林曰若到丹成須沐浴丹成是前金丹之成沐浴是大周天之喻言丹成不用小周既入十月之首必須用大周正陽老祖真人曰一年沐浴防危險伍真陽曰沐浴在小周天固為喻今言於大周天亦為喻在小周曰二時二月之喻此大周言一年之喻在小周可以小喻在大周可大喻也防危險者防一定必有之危險也若仙機有出入則不定其沐浴若佛法不久住亦不定其沐浴沐浴最貴有定心防危險正防其心不定防其沐浴不如法又曰不須行火候爐裏自溫溫此言十月不必用有候之火當用溫溫然旡候之火不寒不燥不有不無方是溫溫的真景象王重陽真人老祖曰聖胎既凝養以文火安神定息任其自然聖胎成於真精陽氣起初煉精採取烹煉非武不能及聖胎既凝金精而成武則無用矣只用文火養之神息定而任自然正是養文火之功用道光曰一年沐浴更防危十月調和須謹節沐浴者無候之火即大周天也一年者大概而言之辭即十月之說凡說十月一年者入定到此時亦可得大定而出定故言之謹節者謹守沐浴之理也防危者防其離沐浴而外馳不定也若一年而得定之後必時時在定年年劫劫俱在定又非止一年十月之說而已陳虛白曰火須有候不須時些子機關我自知有候者大周天之火無候之候也乃似有似無之妙不須時者不用十二時為候故可入無為些子機關是似沐浴而非沐浴常定而神常覺故曰我自知若不知則昏沉火冷而丹力遲矣紫虛曰定意如如行火候如如者如有不有如無不無定意於如有如無之候中方得大周天之真候方是真行又曰看時似有覔時無大周入定本入於虛無若徒然著旡則落空矣故曰似有有而非有不空而空卻似無方是真空真定又曰不在呼噓并數息天然有呼噓數息是言有為者之事今既入定故曰不在有為專任天然以證無為又曰守真一則息不往來真一者在前煉精時煉而所得真精曰真一此煉氣時乃真精之氣得真神用真息之氣守之三者合還神曰真一俱定不動則是息己無息焉有往來古云火記六百篇篇篇相似採真鉛昔參同契亦云火記六百篇篇篇相似卻未說出採真鉛之妙旨此言似採真鉛則玄中又玄者盡於是矣採真鉛者薛道光所謂定息採真鉛是也篇篇相似總歸一大定馬丹陽曰工夫常不間定息號靈胎定息於空神即守息而為胎神定無間斷神亦常覺無間斷而胎神始靈石杏林曰不須行火候又恐損嬰兒初入十月之關必用火候煉氣成胎而化嬰兒之神嬰兒喻神之微也及胎成嬰兒亦成將出現於外之時則旡用火矣若再用火是嬰兒未完成之事豈不有損於嬰兒乎中和集曰守之即妄縱又成非非守非忘不收不縱勘這存存存的誰大周入定化神似有似無似有即神氣之定似無是神氣在定而不見在定之相若曰守便著於有著有即起有之妄念縱之而不照則神氣離而非定之理但微有似存若二氣存則神亦存神停而二氣亦存俱存在定便俱虛無無上之妙境在是矣鶴林曰及至打熬成一塊試問時人會不會不增不減何抽添無去無來何進退神氣合一俱定入一塊則無火矣不似百日火之有增減不增不減安有抽添息旡去來何用進退此歸一而漸歸無之說也我祖師張靜虛真人曰真候全非九六爻也非顛倒非進退機同沐浴又還非定空久定神通慧真候者火候定而空矣不用小周之九六不同其顛倒進退沐浴等而唯定空久定久空神通慧照朗然獨耀同於世尊之入涅槃而滅盡定矣邱長春真人曰息有一毫之不定命非已有有息則有生死無息則生死盡矣必定息至無則命方為我所自有自主張天地陰陽閻君則不能使我生死由我得無死之道也若一些息不盡定則命在息而不為我有由我自已不能主張猶有可死之道也此皆言煉氣化神十月養胎大周天之火候也此又沖虛子總結上文衆聖真所言大周天火一段而言之也豫亦曰大周天之火不計爻象固非有作溫溫相續又非頑無初似不著有無終則全歸大定切不可執火為無以為自了則落小解之果又不可住火於有以為常行則失大定之歸將有還無一到真定則超脫出神飛升沖舉之道盡之矣此豫亦曰起盡之矣止又沖虛子自言大周天之旨又兼叮口寧勸誡者不算計爻象乃無為之異於小周有溫溫非全無是大周初之似有似無之實理也大周之初正是一二三月之時曰似有者尚有有曰似無者未真無所以猶有些子凡火食性在由有些子息故也及至全歸大定息無而食性亦無所以金碧龍虎上經云自然之要先存後忘俞玉吾又注之曰先存神於氣穴而後與之相忘神自凝息自定是也然又當知火本欲歸於無若不知先似有之妙而遽執曰本無何必用似於有則必墮在全有而不能至真無落於尸解之小果矣又當知此火起於似有而求必歸於無若不知有非了手而遽住於有常行於有而不了則亦墮在全有何以得大定之歸饒經萬劫而不死終止於守尸鬼子亦為尸解之類歸生死之途想當初煉精補氣費多少萬苦千辛始得修證於萬劫不傳之祕而得傳以至於小成於此又安可惰忽其大成而不求必成哉我又囑之曰將有還無一到真大定而能常定於虛無之妙境則超脫出神飛升沖舉之道盡之矣此大周天之火所以為成仙成佛了道之總要也我又以化氣化神而總言之前百日煉精化氣必用有為之工是從無而入有即佛法中之所言萬法歸一之義也後十月煉氣化神必從有息至無息是從有而入無即佛入四禪滅盡定也一歸於無之說也此仙佛二宗不易之祕法不可少之要機也沖虛子今為後來聖真重宣明之以接引後聖印證仙傳并免後學執有候執無候之爭立門戶而妄疑之者若此天機自此句直至結尾句了又皆沖虛子總結火候全經之言再指煉神以後向上之祕機以為後聖證羣仙直語已前羣仙皆有直言在世間而人不能悟固非全露從古至今言火候者甚衆並未全言或一句二句而己既不全後人如何用如何擬議所以世之凡夫妄猜唯有仙分者自有仙人來度耳然散之則各言其略集之則序言其詳我見散見於羣書之言或略言採取烹煉之名而不言其理或略言採而不言封固或略言小周天而不言大或略言大周天而不言小或略言火候之名之理而不分言小大所當用之時其意若曰火候原屬不輕傳之祕且說一件令參得此一件任他自己凑合成全去咦曾見幾人能凑合得成全耶而前劫後劫或聖或凡種子或真或僞學人總難致一擬議世逮於豫藉父清廉盛德之所庇田園房店之可賣受盡萬苦千辛逐日奔求師家晝夜護師行道厯十九年而得全旨追思前劫或旡所庇或旡可賣未遇真師受萬苦故不免又生於今劫又憫後聖或有出於貧窮旡父庇旡産賣不能受萬苦焉能苦心奮志而求全有奮志於窘迫中者而志亦不能鋭所以豫不可少此一集詳而次序之留俟奮志後聖而助其鋭志耳亦訴豫苦志勤求者以勵後聖當苦志勤求後聖其自勉諸完全火候不必盡出豫之齒頰出於我口齒者固是我之言我既集而序之即同是我言之出我口者而此集出世則為來劫萬真火經根本後來見者自能從斯了悟不復疑墮旁門旁門者有相之火忍氣著相稱為行火知此仙火自然之定則不復為强制之邪而胎神自就陽神自出劫運自超矣習定入定定成皆為胎神出神超劫之所必用而必證果者故於此厯言所證但於出神之後煉神還虛九年之妙雖非敢言而中和集曰九載三年常一定便是神仙亦且言之矣出陽神是初成神仙時即母腹中初生的孩子一般雖具人形尚未至具足之人形故喻神曰嬰兒幼小未成人須藉爺娘養育恩乃喻為乳哺三年古人所言成就只一二年是也乳哺者神氣已定而又加定之意加至於常常在定而不必於出便似乳而又乳至於成大人一般神既老成若即行煉神還虛九年之工則此即為九年內之煉數若有救世之願未完且不煉九年而權住世以救世及欲超世而上升虛無則必從九年煉神而還虛矣實非世學所能輕悟輕用者必俟了道之士以虛無實相而用之了道之士是出定之神仙唯得定是得虛旡之初基而後可至虛無之極致處方能悟此用此第不可以一乘既得遂妄稱了當不行末後還虛此言或有小根小器之人自以少得為足不求還虛而終不能還於虛矣則於神通境界畢竟住腳不得神通在化神時神也通靈而無礙在還虛時神更通靈而無礙此言神通是言初得之神通尚未老成故曰住腳不得若住腳則止於神仙猶有還虛而至天仙者後來者共勉之豫章三教逸民邱長春真人門下第八派邱真人門下宗派曰道德通玄靜真常守太清一陽來復本合教永圓明此二十字為派者乃真人在燕京東龍門山掌教時所立之派後人稱為龍門派者便是分符領節遵上帝法旨所受之符節同佛祖之衣鉢宗主之帕受道弟子沖虛子伍守陽書於旌陽讖記千二百四十二年之明時萬厯乙卯春日云集此答吉王太和之問最初發筆作此起煉己直論第五沖虛子曰諸聖真皆言最要先煉己謂煉者即古所謂苦行其當行之事曰煉或證道所當行之事或曰事易而生輕忽心或曰事難而生厭畏心如是不決烈則不能成金丹神丹必當勤苦心力密密行之方曰苦煉熟行其當行之事曰煉當行之事如採取烹煉周天等煉精煉氣等或行一時而歇一時二時或煉一日而間一日二日工夫間斷則生疏錯亂如何得熟工夫必純熟愈覺易行而旡錯必時時日日皆如初起一時密密行之方為熟煉絶禁其不當為之事亦曰煉不當為者即非道法而深有害於道法者如煉精時失於不當為之思慮道以思慮為之障而不可望成煉氣時息神不定而馳外向熟境亦障道而忘進悟深入當禁絶之而純心以為煉精進勵志而求其必成亦曰煉道成於志堅而進修不已不精進則怠惰不勵志則虛談然志者是人自己心所之向處心欲長生則必煉精向長生之路而行求必至長生而後已心欲成神通則必煉氣化神向神通路上而行求必得神通而後已此正所以為煉也割絶貪愛而不留餘愛亦曰煉凡一切貪愛富貴名利妻子珍寶異物田宅割捨盡絶不留絲毫方名萬緣不掛若有一件掛心便入此一件不入於道故必割而又割絶而又絶事與念割絶盡而後可稱真煉禁止舊習而全不染習亦曰煉凡世間一切事之已學者已知者已能者已行者皆曰舊習唯此習氣在心故能阻塞道氣必須頓然禁止不許絲毫染污道心所以古人云把舊習般般打破如此而後可稱真煉己者即我靜中之真性動中之真意為元神之別名也已與性意元神名雖四者實只心中之一靈性也其靈無極而機用亦無極出入無時生滅不歇或有時出令眼耳鼻舌身意耽入於色聲香味觸法之場而不知返或有時出而自起一色聲香味觸法之境牽連眼耳鼻舌身意而苦勞其形邱真人西遊雪山而作西遊記以明心曰心猿按其最有神通禪宗言獼猴跳六窗狀其輪轉不住其劣性難純惟煉可制而後來聖真當以上文六種煉法總要先致誠意而煉之然必先煉巳者李淸庵云於平常一一境界打得破不為物炫不被緣牽則末後境誘不得情緣牽他不得元始得道了身經云聲色真絶精氣不全萬緣不絶神不安寧以吾心之真性本以主宰乎精氣者宰之順以生人由此性宰之逆以成聖亦由此性若不先為勤煉熟境難忘昔鍾離云易動者片心難伏者一意熟境者心意所常行之事也如淫事淫色淫聲淫念等正與煉精者相反相害一旦頓然要除未必即能淨盡或可暫忘而不能久或可少忘而不能全焉能煉得精煉得氣必要先煉己者為此故也焉能超脫習染而復氣胎神哉習染之念未除則習染之事必不能頓無必要以習染念與事俱脫净盡而後遇境不生烟火己方純氣可復歸神可靜定而成胎矣當未煉之先未煉己之先也每出萬般變幻而為日用之神平日淫殺盜妄心貪心善心惡心欺心等皆是變幻猶且任精任氣外馳不住任氣動而化精任精動而淫姤而不攝之令歸根復命由己不煉而不攝也古云未煉還丹先煉性未修大藥先修心蓋為此而言也昔馬自然真人云煉藥先須學煉心對境無心是大還中和集云念慮絶則陰消幻緣空則魔滅張虛靖真人云欲得身中神不出莫向靈臺留一物皆同此能煉之者因耳逐聲而用聽則煉之於不聞目逐色而用觀則煉之於不見神逐感而用交則煉之於不思此三者皆真實煉法正釋上文割絶其所愛之說平常日用必須如是先煉則己念伏降而性真純靜談長真水雲集云絲頭莫向靈臺掛內結靈丹管得仙重陽真人全真集云湛然不動昏昏默默無絲毫念想此定心由降而得及至煉氣煉神則不被境物顚倒所弄已有定力不從外境所誘採藥而藥即得築基而基即成結胎而胎必脫方名復性之初而煉己之功得矣有不得其先煉者當藥生之時不辨其為時百日之初煉精時貴有藥生藥生者元精之生也辨元精生時而用採法若淫精犯于淫念則邪法不可採者淫念未煉淨者何以能辨元精煉藥之候不終其為候煉藥有周天之候或驚恐或聞或思或昏沉以致火候不終者有之藥將得或以己念而復失元精還補元精將滿亦或有淫念未煉淨乃復失為淫精者有之故古人有走丹之喻者即此神將出或以己念而復墮心逐見聞覺知於外馳則是尚未得大定而有出入背卻胎息經所謂不出不入自然常住之旨出馳著境同儒之物交物亦同禪人之說獼猴跳六窗內猴與外猴相見者如是如何能入定以完胎欲其氣之清真己不純必不得其清真採取先天氣之時唯煉己純者能辨清真則不失其清真若煉己不純一著思慮習氣則失清真矣欲其神之靜定己未煉必不得其靜定神能入定則得靜入得三分五分定便得三分五分靜十分定則得十分靜常定則常靜神靜定則氣亦皆靜定氣歸神為一矣即是氣化神而成胎仙矣不煉己者必不能到此或遇可喜而即喜或遇可懼而即懼或遇可疑而即疑或遇可信而即信皆未煉己之純也此四者皆外來之天魔也遇而信之則著其所魔矣雖由此前未預為煉己之過倘於此遇時即煉巳遇如不有所遇魔即不如我何邱真人所以當過一番魔長福力一番是也倘於初一遇便不當過及道愈高魔愈多如何當得過吉王太和曾問魔有種種之多卻如何知得當過沖虛子曰最易不怕他有萬樣奇怪我將神氣俱入定中任他多種魔來絶不能與我相遇矣又有內本無而妄起一想念謂之內魔障或有生此而不知滅不能即滅者或有滅其所生而復生復滅者皆障道耽遲大周天之候也必煉己者而後能生滅滅己生而即滅滅而至於無可滅又有外本無而偶有一見一聞謂之不宜有之外魔障上文喜懼疑信四種俱屬此見聞之內或用見用聞與之應對而不即遠離者亦障道一有應對則著魔為魔所轉矣故障道必先煉己者而後能無見無聞能煉己者即具不睹不聞之本體即有不睹不聞之實效此己之所以不可不先煉也昔有一人即山東姓張者坐中見承塵板上一人跳下立於前沒入於地坐中者在圜中坐時也見者心不定於神室而外馳偶有此一見也若心在定則亦何以見此復從地湧出立於前見其神通變化而認為身外身誤信常人之言曰神仙出了陽神便身外有身然本性與虛空同體本旡形身若起一念要顯有身便能有身不可以見外為我身不識為身外之天魔吉王太和問彼既不識今老師及昔二真人是何法識得沖虛子曰我本性在定得到定力足而後有可出定之景到由我自性升遷於天門念起而出猶是虛空旡體乃六通為用無所障礙若非我念所出而有見者便是外來之天魔邪魔若出神之景未到則神通未足不能變化雖欲顯身而不能有身豈可以無我念之身而認為我哉神通足者世尊謂之四神足即為魔所誘動出圜而遠叩邱祖祖曰見者不可認不宜出而妄出雖有妄見斬退猶恐不速何敢認為我不宜出者未成定之先求其入定而不可得又何敢妄出而終於不入不成耶此所以不可認也乃不知信由於無仙師真傳故不能以信法語又謁郝祖郝與邱本同師度則同道同知識矣既不信邱何必見郝祖曰邱哥說者便是惜乎猶不知信不復更居圜中而廢前功矣此亦己未煉純之證也昔邱祖坐於崖下崖石墜壓折肋知是天魔祖不為之動如是當過五番不動一念直證陽神出現見山河大地如在掌中昔世尊坐於菩提樹下魔王波旬領百萬魔衆以兵戈恐佛而不動以魔女淫事誘佛而不動坐至金剛牢固自言我終不起離於此座昔費長房隨壺公入山修道壺公以朽索懸大石於座上又令巨蛇囓索將斷而費全不驚不動者皆是此得煉己性定之顯案也并書以勵同志築基直論第六沖虛子曰修仙而始曰築基築者漸漸積纍增益之義基者修煉陽神之本根安神定息之處所也基必先築者蓋謂陽神即元神之所成就純全而顯靈者常依精氣而為用神原屬陰精氣原屬陽依真陽精氣則為陽神成就純陽不依精氣則不能成陽神止為陰神而已精氣旺則神亦旺而法力大精氣耗則神亦耗而弱此理之所以如是也欲得元神長住而長靈覺亦必精氣長住而長為有基也自基未築之先元神逐境外馳如見色境在外則必起淫念則元氣散元精敗基愈壞矣所以不足為基且精之逐於交感年深歲久戀戀愛根一旦欲令不漏而且還氣得乎此無基也氣之散於呼吸息出息入勤勤無已一旦欲令不息而且化神得乎此無基也神之擾於思慮時遞刻遷茫茫接物一旦欲令長定而且還虛得乎此無基也此三段是申明上文基已壞者而不足以為基之說古人皆言以精煉精以氣煉氣以神煉神者正欲為此用也是以必用精氣神三寶合煉精補其精氣補其氣神補其神築而成基唯能合一則成基不能合一則精氣神不能長旺而基即不可成及基築成精則固矣氣則還矣永為堅固不壞之基而長生不死玄綱論云道能自無而生有豈不能使有同於無乎有同於無則有不滅矣證人仙之果矣為出欲界升色界之基者以此為十月神定之基者以此而九十月不昏睡者有此基也十月不飲食不寒暑者有此基也十月神不外馳而得入大定者有此基也所以煉氣而氣即定厯百千萬億劫而絶旡呼吸一息煉神而神即虛厯百千萬億劫而不昏迷一睡亦不散亂一馳與天地同其夀量者基此與聖真齊其神通靈應者基此此所謂陽神之有基者基成由於陽精無漏而名漏盡通不然無基者即無漏盡通矣雖證入神通不過陰靈之性五通之果五通者是陰神之神通也若陽神則有六通多漏盡通也六通者天眼通天耳通神境通宿命通他心通漏盡通此一通為陽神之所多餘五通陰神同宅舍難固陽精無漏則身長生不死為金剛堅固宅舍可永劫不壞若有漏之軀有必死之道身不堅固也不免於死此而生於彼若有祕授躲橫生而擇竪形者猶且易姓改名虛負今生矣陰神何益哉陽神之基可不亟築之哉可不急究之哉世有以淫姤敗基者反誑人曰採補築基欺騙愚夫共為淫樂一遇淫媾而精無不損者氣無不耗者神無不蕩者基愈滅矣直誤至於死而後知彼淫邪術假之悖正道可不戒之哉此篇正文重重自相申解已詳不必再生注意煉藥直論第七沖虛子曰仙道以精氣神三元為正藥元精元氣元神曰三元皆先天也以煉三合一喻名煉藥昔谷神子云道以至神為本以至精為藥以沖和為用以無為為治長生久視之道成矣若不如此即非金液大還丹之法其理最精微其法最祕密昔鍾離曾十試於呂祖邱祖受百難於重陽我伍子切問二十載於曹還陽逢師於萬厯癸巳年三月受全道於壬子年三月間以癸壬計之二十年也我當初每自恨福力之薄不䝉師一速度今而後始知待教久者入道精不然何以能高出萬世耶豫又按白玉蟾云十年侍真馭白又云說刀圭於癸酉七月之夕盡吐露於乙亥春雨之天又當知天機非邂逅可談方才有得是以世之茫然學道者及偶然漫談者皆不知何者是真藥而何法為真煉徒然空說向自己身心中而求實不知有至靜之真時真機也夫至靜之真時者是此身心靜極即所喻亥之末子之初也陰靜極必有陽動靜屬陰動屬陽陽極則陰靜陰極則陽動則氣固有循環真機自然復動此正先天無形元氣將動而為先天無形之元精時也即此先天無形之精便名藥物既有藥氣生機必有先天得藥之覺即時至神知之說亦即我神氣同動之說也即以覺靈為煉藥之主以沖和為煉藥之用覺靈者妙覺靈心也沖和者烹煉薰蒸之火氣也此正三家之初相見也亦三華之所聚者則用起火之候以採之因有藥生而起火即活用子時起火曰活子時藥生與火生同時故以火之活子時而稱藥亦曰活子時達摩云二候採牟尼言採藥用二候也四候別神功言沐浴用四候也同此須辨藥之老嫩採之嫩則氣微而不靈不結丹也人人都說藥生要辨老嫩若嫩則氣微配合之則旡半斤八兩之氣何以成一斤故不靈採之老則氣散而不靈亦不結丹也老者只是過於當採之時當採而未採則氣以久而虛散皆由心生怠惰而至此氣既散則力亦微配合不均不能成丹故亦曰不靈得藥之真不老不嫩如九二利見者曰藥真非初九之勿用亦非上九之有悔既採歸爐則用行火之候以煉之行小周天之火也藥未歸爐而先行火昔呂真人戒之云無藥而先行胎息强留在腹或積冷氣而成病顧與𡸅庠友問既知採藥何故又不歸爐沖曰傳正道知真採故可必得歸爐又要行火合於候之妙方得藥歸爐若火止早了是名火小不及不名沖和沖和者和而沖也古人有喻者曰如浴之方起而暖氣融融然火既小而不及邱真人已言曰則金精不飛是也焉能得藥歸爐悟道真修者必先從我此答精思之則知直至末後皆是如此藥竟外耗而非為我有藥尚未入鼎中而妄行火即所謂鼎內若無真種子猶將水火煮空鐺之說不成大藥藥巳歸爐而未即行火則真氣斷而不續亦不成大藥藥在外由火以採之而歸爐亦由火烹煉之方在爐中成變化已得藥歸爐火斷而不行則真氣亦斷而不住及再行火雖周一天終與前不續藥亦不續如何能成大藥即參同契注所云外火雖動而行內符不應則天魂地魄不相交接是也若肫肫然加意於火則偏著執於火而藥消耗執著用心於火則著有相而急躁近於外道之存想有為非自然之天機妙用若悠悠然不知有火則迷散行火之時若心不誠則不靈或昏迷十二之時或迷失刻漏之數或忘沐浴之候或不知以何數周於天或周已而猶不止皆是失於火而藥亦消火不能留藥焉得不消即神不留氣之喻皆不成大藥已上皆言孤陰寡陽偏有偏無之危險也若火間斷而工不常雖藥將成而復壞火所以煉藥古云火藥一處居行火之法愈久而愈密愈密而愈精斯則必成大藥必得服食或有時神逐見聞淫念馳於外而著魔則神離火火離藥工不常矣藥如何得成雖將成猶有退散之危險若久執行火而不知止足雖藥已成而亦壞火足矣即成大藥因藥成而言足也藥既成則不必用火安得不止藥已成者成之而生為服食之大藥於此即採而藥不復壞為後天有形之精不止火不採則大藥必隨生機而將妄行欲歸之聖路無奈不止火不採而無由以受欲歸之凡路竟趨為後天有形之精不難矣後聖當知此為至要至祕所當防之危險也皆不得服食必火足而藥始成藥已成而必知止候方有大藥可採方可服食不然必不得藥成服食後世聖真修此必使神氣相均相合火藥適宜以呼吸之氣即火也乘真氣為動靜即藥也以真氣之動靜定真息之根基真氣歸靜於根則真息亦定於根二氣合一於根以為胎神之基也則火藥既不著於一偏又無强執縱失之患如此而煉方得小周天之妙理方成長生之大藥始名外金丹成也馬丹陽云因燒丹藥火炎下故使黃河水逆流玉芝書云玄黃若也旡交姤怎得陽從坎下飛是也祖祖真真服食飛升之至寶乃最上上之玄機最宜參悟而精修者也此論備陳煉藥時之危險令後聖知防慮於此不至當面錯過而不知也神仙所言金丹服食者是腎中所得金液之氣配元神合煉所成服食之則能神通變化若方外之士言服食者不過妄以金石草木誑人曰煉服食斷不可為以誤大志縱服食之或有疾宜於金石藥者而偶致愈或旡疾而中毒成大患必不能超出三界而顯神通也得此真藥服食自可進修行大周天之火候以煉氣化神煉氣而息定化神而胎圓陽神升遷於天門而出現神仙之事得矣中關十月之事完矣其後面壁還虛九年一定以神仙而頓悟性於無極形神俱妙總煉成一個不壞淸虛聖身皆由煉藥合仙機而得成丹成神者之所至也故凡大修行上關大成事必如此則畢矣於此畢法中始於百日煉藥而成服食者無量壽之地仙也地仙者地上所行之仙身形重濁未離故不能離於地而升虛無之天也人仙雖長生亦同於地仙重形尚在故亦不能離人與地也中而十月煉成脫胎出陽神之果者超出陰陽之神仙也神仙者離重濁之形以無形之神變化或有或無皆由一神之妙用故曰神仙終而九年面壁煉成還虛之果者超出盡天地劫運之天仙也初得神仙乃得大定而出定者但得定由於守中而出定則居泥丸故世尊已入滅而亦入於泥洹是也至此後還虛則又入定於泥丸古人云性在泥丸命在臍蓋言了修命之事在臍了修性之事在泥丸也泥丸之定則非從前者比九年一定者特以始入之時而略之或百年千年萬年一劫百千萬劫皆可入為一定此正天仙佛之超劫運者有仙緣者遇此天仙正理直論其亦齊心以識之伏氣直論第八沖虛子曰人之生死大關只一氣也有氣則生無氣則死此首以人之已共知者言令人易明生死聖凡之分只一伏氣也氣能伏定則聖不能伏定則凡此首以人之皆能者言令人易學於入聖超凡也而是伏義而者轉文助語乃為藏伏而亦為降伏藏伏者深藏歸伏於元氣之根降伏者管攝嚴密不許馳於外此二者亦有防危慮險之意唯能伏氣則精可返而復還為先天之氣神可凝而復還為先天之神所以煉精者欲以調此氣而伏也煉精小周天調其息而伏為其不能頓伏故用漸法調而伏達摩祖師顯宗論亦言似此意所以煉神者欲以息此氣而伏也煉神大周天胎息其息而伏為其不能頓息於無故亦用漸法胎息其息似有而無乃至於無有無無而伏於寂靜始終向上之工只為伏此一口氣耳所以必伏而始終皆伏者是何故蓋當未生此身之時就二氣初結之基在丹田隱然藏伏為氣根久伏於靜則動而生呼吸是知由靜伏而後生呼吸之氣以成人道者曰順生也而是逆修曰成仙者當必由呼吸之氣而返還藏伏為靜此氣伏伏氣之逆順理也及呼吸出於口鼻而專為口鼻之用呼吸至於口鼻則落生死之塗矣離口鼻則離生死真氣發散於外遂至滯損此氣則為病耗竭此氣則為死蓋不知伏為所以復之故伏者欲將呼吸還復歸於氣穴而為不呼不吸之故也必此氣伏於氣穴而後元氣能歸元神能凝三者皆伏於氣穴也而亦不知行其所以伏行所以伏者言有至妙至祕之天機呼吸合於天然者為真元氣得合當生當採之時者為真元神合虛極靜篤者為真三者皆真而後得所伏之理行之而必成不然則亦世之外道而已安保其能久生而超生死於浩浩劫之外耶三者不真則非所以伏之理故不能超過浩浩劫之運有等妄言伏氣者而不知伏氣真機真機者有元氣元神而呼吸正合天然自在方為真終日把息調而口鼻之呼吸尤甚調息者調其內用之玄機如槖天籥地徐停息之說世之愚人不聞天機只把口鼻數調如隔靴搔癢焉能調得到無息癡心執閉息而腹中之逼塞難容閉息者靈寶畢法書亦言之是言不通其息出入之門也雖旡門卻有安頓自然之妙理非强制之為閉也强制則不真故無成真禪家與真仙道略同若癡禪人之假禪亦與癡道人之假道同學者不可不察禪宗人有一等假禪者曰吞聲忍氣曰氣急殺人皆言忍住氣而不出入此是病非禪也强制則念是動的不是靜何以為禪禪字解作靜字若是自然真靜方為真禪哀哉此妄人之為也安見其氣之伏而靜定也昔邱祖云息有一毫之不定命非已有息得呼吸絶則生死之路絶息有呼吸不定故不免生死而伏氣之要正修士實用所以證道之工也但此天機之妙絶與世法不同古人託名調息者世人之息一呼一吸均平無用調矣仙道託名調息者非世法之用乃調其有而至旡旡而至有為其以神馭氣行之必住住之必行在乎行住之間而調之也隨順往來之理而不執滯往來之形欲合乎似無之呼吸也當有往來不强使之無而唯隨順之似心息相依之說亦不强執害其自然而為勉强託名閉息者世之言閉是勉强不合自然仙家言閉只託言閉之名而非用彼强閉之實故范德昭曰內不出外不入非閉氣也我故曰託名者略似閉氣而實非閉氣也而內則空空如太虛無物空如太虛是真虛無則真息便可歸於真無真禪理亦似之若上文所言內不空而逼塞者是强閉者外道邪法旁門之類皆然欲合於無極中之靜伏也無極者無一氣之始及後太極則有一氣之始一判則為天地今言無極乃言天地及一氣俱未有之先即為父母尚未有之先正是虛極靜篤景象妙悟必至如此為真靜伏總之為化氣化神之祕機古人云長生須伏氣故自周天而厯時日年劫惟伏此氣言有一小周天之所伏有一大周天之所伏一日之所伏一年一劫之所伏或暫或久而能成其一伏者真有道之士也此氣大定則不見其從何而伏始亦不見其從何而伏終無始無終亘萬古而無一息與神俱虛俱靜斯謂之形神俱妙之境也世尊能以一法說八千劫而後已能以一定坐八萬四千劫而後出定是其形神俱妙與仙同者唯聞天仙正道者方能識得此理惟有三寶全功者三寶者元神元氣元精若一寶非元則不為寶屬於後天者無用亦不得為全功方能行及此工此工者即上內如太虛證入無極靜定者言若三寶會合煉成化氣而後可行大定常定工夫若未化氣則亦無用此為有大志聖真請究之而實悟之胎息直論第九沖虛子曰古胎息經云胎從伏氣中結氣從有胎中息斯言為過去未來諸神仙天仙之要法也男子身中本無胎而欲結一胎必要有因則因伏氣於丹田氣穴中而結胎是胎從伏氣中而結也元氣靜而必動欲得元氣不動必要有藏伏因有胎即藏伏之所乃息而不動是氣從有胎中而息也胎因愈伏氣而愈長氣因愈長胎而愈伏共修成一個圓滿胎神斯所以為神仙天仙之要法非此抑將何以成之然胎息與伏氣本是一事何分兩論只為懷胎養神必用胎息而後成胎而神住胎古人皆以胎息言之今亦詳言於煉氣化神時也伏氣之說為伏氣而得精還化氣煉藥以得大藥古人只言伏氣今亦從之言伏氣雖兩言之中則互明其理令人知兩言之妙而不妄疑妄執其為兩豫願再詳譯而直論之夫人身初時只二氣合一為虛空中之氣而已無胎也亦無息也此言無胎無息起下文返還成仙之所證因母呼吸而長為胎因胎而長為息修仙者亦必因呼吸而長為胎因胎而長為胎息及至胎全妙在隨母呼吸而為呼吸所以終日呼吸而不逼悶此緣不由口鼻呼吸只臍相通故能似無氣息一般此正真胎息景也古人謂內氣不出外氣不入非閉氣也之說正言由臍相通者離胎而息即斷在胎中則我之息由母臍中所生故我息亦在臍而口鼻不可呼吸離胎則口鼻開竅可以呼吸順而易矣當此時且不知胎息安得復能胎息無母臍與子臍相通不得不向自身口鼻起呼吸即與胎中呼吸同而暫異其竅耳逆修返還之理安得不以我今呼吸之息而返還為胎中息耶凡返還呼吸時以口鼻呼吸之氣而復歸於胎息之所即丹田之所許旌陽云臍間元氣結成丹谷神不死因胎息長生門戶要綿綿元始得道了身經云中宮胎息為黃婆抱朴子曰得胎息者能不以鼻口噓吸如在胞胎之中則道成矣以鴻毛著鼻口上而毛不動為候也如處胎息之時漸漸煉至胎息亦真無真無者滅息盡之義也謂胎中之息亦真無之此正禪宗人所謂萬法歸一一歸無之說方是未生時而返還於未有息未有胎已前之境界不落生死之途者矣凡人有呼吸則有生死無了呼吸則無生死所以得如此者亦非驀然無所憑依配合便以呼吸歸中而可胎息者呼吸之氣最難制伏必有元氣相依方可相定而成胎息然胎息何以知其成也以呼吸歸於胎息則口鼻無呼吸而成胎息是其真成也終不復至口鼻為呼吸真禪定者亦似此若凡夫外道不知元氣者為何單以呼吸歸於中而妄曰入定胎息其息不能定住於胎所雖忍氣而氣無所容乃曰氣急殺人而終不能强忍口鼻之氣更呼吸浩浩皆由悖卻世尊所謂旡生法忍者之所為也世之假道人假禪人皆如此此亦後學聖真之所當辨而自防危險者也所謂孤陰不成者此亦其一也呼吸之氣乃後天有形之陰物故亦如此言之必要有先天氣機發動之時又有元靈獨覺及呼吸相依三寶會合已先煉成大藥者而轉歸黃庭結胎之所於此之時此時者是當此結胎之時因文上句皆言先所化氣而至此始言胎息之意也此正申明必要煉精化氣以氣助胎以神主胎以呼吸結胎方成真胎息而後以胎息養胎神得神氣乘胎息之氣在中一定神氣與胎息相乘方是有配合的修真胎息之工所以能成真胎息得真定若無真氣便不是金剛不壞之身坐中只是昏沉瞌睡如何能長覺長明以長馭氣入大定成胎乎有間斷即非胎息即是結胎之始正入藥鏡所謂初結胎看本命而得者本命者二氣也元氣為生身命之本呼吸氣為生身命之具而結胎之初必要本命二氣隨神之號令同凝於中而為真胎者也雖似有微微呼吸若在臍輪而若不在臍輪在虛空正度人經所謂元始懸一粒寶珠去地五丈如世尊之前地湧之寶塔在虛空中等語皆是也皆用運旋以漸至成胎頓然絶離口鼻不存呼吸滅卻有作恰然處胎相似而胎中之息始雖似有而終絶無即是真胎息所以成陽神者若無大藥真氣服食若非三家相見必不能胎真息而神真純陽者也如是而久久無間斷綿綿密密無時無刻而不是在胎中無息之景真證陽神大定絶無動靜起滅即是胎圓乃返還到如母胎初結一氣未成我而未分精氣與神之時正入藥鏡所謂終脫胎看四正而得者看四正者驗四正工夫之有無也有則胎尚未圓以其有乃養胎之工也無則曰滅盡定而陽神成就矣胎息還神固曰畢矣胎事畢滅盡定佛亦滅盡定入涅槃故其經云若於佛事不周不入涅槃佛事周訖方入涅槃畢其十月中關之事神仙之證也猶有向上田煉神還虛而證天仙者在所必當知故遷神於上田而出天門以陽神之顯見者倐出而倐入何也當前之十月之內而或有出者是不宜出之出也由六根之為魔而妄出陽純則無魔陰盡則無魔陰將盡而未盡甚為魔者要除陰盡是要除魔盡也妄出則神走而著魔境而息亦走著於口鼻必急入則依於息而歸胎此一段又再詳指示人以十月內之所當防此危險者此時之出是當出而出也昔藍養素胎成當出而不知出故劉海蟾寄書與之指示所出之法故起一出念而出陽神於天門天門者傳道集所言指頂門也古人於此贊之曰身外有身是也若出之久恐神遂失而錯念古云十步百步切宜照顧故即入上田而依於虛無之定所以神既出胎喻同人生之幼小須三年乳哺者以定為乳哺也又言九載三年一定者言出定之初時而入定以完成還虛之天仙也證到至虛至無即證天仙矣然是定也入定時多而出定時少又宜出之勤而入之速也我故曰出定之初即為入定之始也雖天仙已證亦無不定之時也故世尊亦曰虛空界盡我此修行終無有盡正如此也至於終天地之後超過劫運亦無不定之時也此猶仙佛以上無仙無佛之妙境而天仙佛之至者也後來聖真共知之共證之此書稿成於天啓壬戌歲實欲藏之為門下學者便心目不意被人盜去但儒者竊取仙書愛慕之心勝可怪又可惜也由駱友而失駱故想像而梓不無疏略今崇禎已卯秋查舊稿加注賢道友復梓之以廣度人流行於天地之終皆所願也故附識直論畢直論起由豫作天仙正理直論僅僅九章完全畫出一個天仙樣子令有緣有志者見為頓悟有志者不遇此書亦是無緣於道遇此而不參悟亦是無緣於道又或有遇之而無真學之心唯圖詐僞欺世者亦當改惡從善而歸正道非敢曰輕泄天機妄擬無罪只為度盡衆生為自度計者於是冒干天譴而直論亦緣我老祖師張靜虛真人得道後曰今日四大部洲絶無半個人兒知道今當廣開教門奉此仙旨故也張真人法派名靜虛常攜虎皮為座故當時皆稱虎皮張初與三友尋訪仙道夜半見白毫光於西而衝天次日西行夜宿又見日又趨之二友去而獨行獨見得光處在蜀之碧陽洞也入見仙師而求度甚切師遂受之道命之修數年成而始命出曰今日四大部洲絶旡半個人兒知道你與我廣開教門張翁遂行按四大部洲者東勝神洲西牛賀洲南贍部洲北衢廬洲佛經所說者是也張仙翁遂出西域轉北夷還中國見二大洲已無人矣實起度人之念止度得李虛庵一人而已厯十五年間再傳而遞言於豫十五年間者張真人於萬厯己卯年度李虛庵至壬午復至李家助李銀為行道之資李真人於萬厯丁亥受曹還陽請至其家曹與三友各具贄六金助道不足戊子曹三友又助師三十金而修成證果矣曹真人於萬厯癸巳與伍子遇甲午年夏五月度伍子計之己卯至癸巳十五年也至壬子又十九年曹復度伍子仙佛合宗全旨以出三界之上者并傳以助道之方囑之曰此元史所載邱真人助國之方也唯默記之倘護道要用則用之否則間置之可也勿為世間作孽取大罪也豫之十九年中苦志苦行或亦少倣佛於長春祖之苦志者得全大道敢不如命戒之哉豫初若為駭聞駭世之學道者多豈真無半個人兒知道而久之真見同世斯人不同聞斯道得師度之後遍考仙聖之書聖聖同此一道也同此修成正果也差毫髮尚曰不成豈可有不同者乎每考問於全真侶不過只知御女採戰及卻一病小工為詭求衣食之計者與仙道之保精保氣胎神之理者不同聞考問於禪宗人不過曰當下便空以降魔轉劫僅為死後生人道之說與佛法空而不空之真空超劫之妙法不同聞又考在家俗士之學道者求假做黃白成富貴求房術久戰遂淫樂並無學道之實而志不同又考在家俗士之學佛者妄自尊而誑人曰曾參學手抱非忍利身觸悖天王口稱著當下就了只就了得一席淫媾何曾聞佛法可了而聞實不同世界劫壞如此安容得不直論而一救之耶又安容不直論留為後世聖真作正知見耶故作此以指引後來凡我邱祖門下符節正傳弟子得師口訣凡藥生內景時至則神知為內景藥氣馳外則外別有景採藥真工即達摩祖師所謂二候得牟尼者行火工小周天之候即達摩祖所謂四候別神功止火景詳後仙佛合宗語録中採大藥工自古聖真所不輕傳此以前得百日煉精化氣之真法行得全功只成精滿氣足之凡夫知此而用得大藥方得長生此先聖所以必俟百日功成者而後言之得大藥景有六種震動之景也丹田火熾兩腎湯煎眼吐金光耳後風生腦後鷲鳴身湧鼻搐六根因其滅識皆有景驗三關工即名五龍捧聖者從此超凡以入聖乃聖聖不輕傳之祕法天機世間之所不知不聞者必俟百日功成者而後言之服食工度過鵲橋而下重樓喻曰服食非如飲食樣之食守中理此大周天之初古云守似有卻如無不有不無故喻之曰守中又聞胎息本在臍而若不著於臍養神本養中田之神又若不離於下田總若合二田成一虛空境界故亦喻之曰守中正祕密天機有不得顯言者出神景出神收神法煉神還虛理此守出收還等五者皆詳後仙佛合宗語録中厯厯祕授厯授者次第盡傳上文十二句之祕法乃正傳之所必有而後聖真修之所當必受者聞人世所不知聞者言後聖得遇聖師而有所聞者人世者彼後聖同世之人也彼人所知皆世法中之旁邪小術唯聖所聞皆彼不知正與直論中十二句祕法同見凡書所不載見凡世前書巳載者皆古聖大略之言也不載者精切祕密天機舊不載於書而今得聞於聖師正與直論十二句皆同則師言可篤信奉行直論可憑稽考要知非遇仙者無真聞見非遇仙者不能措一言為直論當下工修煉時更以直論相印師言古聖之書每言一句又祕卻二句三句何以得全印證欲求全證又要搜索多書此貧者之愈難唯此直論兼注又後有仙佛合宗語録及門仁賢問答之要以詳直論注腳盡露全旨則後聖得此一書足以全印可無餘恨矣得了然無疑無礙直證天仙唯我作書助道之一願也後來聖真未及得正傳者尤當從斯入悟究其逐節工景違合凡有所聞即徵諸此書合則正違則邪作人天眼目者唯此書耳則不為妖人邪說所惑矣凡一切邪說旁門皆與此書相違悖如有真志精修不參此論是自絶於仙佛正道者也竊談此論而行邪行以誑世者如昔一光棍專以房術欺騙人者乃借言曰鉛汞不在身中取已明明說破愚按棍賊此言謂鉛汞不在自身是女人身上取的鉛汞者喻陰陽豈有陰陽二者俱在女身取之言而可欺人取信乎猶且言之咦天律王章共誅之此書本代天仙救世代佛破邪盡是表明天上梵德至道之言有天目共視天耳共聽天律共護若有邪人假借正言行彼邪說天有霹𩆝伐其性命王有典刑滅其身形并揭禁誓書末以為誦書者知誡後跋沖虛子跋云道為天仙之祕機天仙之道唯天仙知之行之凡夫去天之遠何以得遇惟不可遇雖曰不祕而亦是祕若有得遇知其道者必要體天仙之心行天仙之德而後可成天仙之道凡夫之罕見為今之凡夫者前雖有善而或有小功不足以得道故難遇若能從今起念學道時全具善心力行善事絶其從前間有不善者則道之罕見者猶可望見也或百劫百年一傳於世如唐開元時之純陽翁始度王重陽於宋𡽪欽時如六祖盧能止衣鉢不傳而後竟無傳法之七祖者或片言數語密度於人如鍾呂二仙度燕國宰相劉海蟾以卵壘為山而不崩墮劉曰危哉鍾呂曰汝宰相之位更危於此劉棄相從之而仙去如虎皮座張真人以嘉靖帝强請之不起罪邳州守請屢及三年而後至京延及徂落而不復命還至六安州召盧江縣李虛庵而度之令三誦三背其言三日而別李竟成真縣及鄰封皆稱肉身菩薩然張祖不肯見帝而度乃召李而度之此亦張祖密度之案也如佛欲度迦葉分恆河水為兩斷而佛行其中之無水處葉以舟救佛佛從舟底穿入而舟底無孔葉猶曰幻也佛曰汝未成不生死阿羅漢何能如此貢高我慢葉驚服自不知所以不死而歸依之是也三口不談六耳不聞三人則三口六耳也其中或願學小成於人仙者或願學中成於神仙者或願學大成於天仙者所願者則重之而喜聞所不願者則輕之而厭聽或德止足以授小而分不宜聞中大二成故不同談不同聞也如許旌陽吳猛二人許為旌陽縣令吳為分寧縣令也同謁丹陽之諶母元君母獨傳許以道法謂吳德行尚未充後當拜於許授如世尊單傳迦葉為初祖而以堂弟阿難未能離欲令轉拜葉傳為二祖俱是舊案也不經紙筆仙道乃天上人之所有亦天上人之所用正上仙口不談之祕鬼神覻不破之機所以不載筆於紙何敢淺其說直其論而諄諄然數萬言為鐫哉此大罪也大道本不敢輕一言於非人之前何敢淺說其精深直論其祕密令善惡賢否正人非人一概混見之耶但視世間無不可救化之人倘有不從正而改邪者是必從地獄餓鬼畜生三惡道出而初世為人而惡心猶在故也雖直論之彼只見如不見而已矣何嫌其混見曾見一人截然向道而竟無覓處截然者截斷世法塵勞決志學道滿目是萬法千門竟不見何者為仙道不知向何處覓仙道此甚可憐舉世多人談道而悉墮旁門遍世界談道所聞所知全在淫邪窠臼中初學不能辨邪正遇之焉不墮入此又甚可恥謂道不在世而人必誤陷於邪者也有仙道原只藴藏於仙胸中世何得有一切諸人不遇仙度皆只在世而學焉能外世見而求世外之見畢竟誤陷於邪矣謂人心自邪不求聞道而規正者也有心邪之人唯邪法是喜口稱是學仙之黨者只願學房術御女謂淫姤有如是快樂是我所學之有證而仙道高遠或者即此所致我何必舍此快樂而別求仙樂為哉故不求聞也自稱是學佛之黨者造斷見之邪說而惑人不知已為佛之所斥自謂有了此一口高談捷語足取衣食名譽何必效佛所修而六年禪坐以自苦故不求聞也豫在金陵所以絶不屑與人談仙佛見彼諸俗人談仙者皆志於房術御女及卻病小工而即指為仙道不務修德修道故不必與為謀也見彼衆生談佛法者皆妄將佛說為行教無用之虛言將已談斷見作佛法不求如何如佛八千劫說一會法華經方已不求如何得如佛八千四萬劫坐一定方起必執斷常邪見直趨死亡為了生死或學躲一輪回為自足而且不能得又不能承當正法竟如石馬雖打不走全似木牛拽鼻不回謂之下愚不移何足救化何足與言所以秪遵仙佛正法為我自悟師而已矣我又為有相知者憫而淺說勸之佛昔云人相𥪡畜相橫世之俗夫每以橫相妄談佛法語人曰我知佛我是佛此亦妄人也已矣甘為橫相又何難焉今而後談佛者請先改汝橫相為𥪡相且遵佛說別作商量庶免空勞妄談虛度一世借令百劫百年生一聖真將何入悟言此論若不出世倘有真修者不知如何修仙不知如何修佛故無趨向處亦不知學何者為學行何者為行所以得聖真於學者必由此論及有此直論并仙佛合宗語録出世若有一人精究此論及録便見得此人是有志於此者與論合志即為學此道之聖真不究者則其志不學此終於凡夫輪轉而已得聖真於師者亦必由此論誦詩讀書而尚論古人者固有人誦此論而尋覓論此之人者亦有人未誦此論而尋覓已誦此論者亦必有人能覓此人豈不得遇此人而得遇此道故曰求師必由於明此論所以張紫陽真人作悟真篇以訪友果得石杏林為之徒其勝於奔走四大洲訪師友者不萬萬分便益哉故鍾離云吾之求人甚於人之求我古云弟子尋師易師尋弟子難蓋弟子以初學之無知故不知所遇之人有道無道而拜之故易師之有道者上奉天誡必選擇同德同志祖父善門一不全不足為弟子故尋之難昔鍾離往九江府德化縣度縣宰呂純陽又鍾呂往甘河鎮度宋𡽪欽時領兵校尉王重陽又鍾呂往燕國度丞相劉海蟾又虎皮座張真人行至六安州馬神廟召廬江縣之李虛庵而度之又昔世尊往榆羅厥叉國度迦葉者皆是師急於求人之案人不及於求我我不及於求人世界如許大學者相隔如許遠誰知我而求抑誰知我而能求由我非方外之士遊遍四方者亦非如所謂唐朝呂洞賓至今猶在尋人度者亦非如世尊自謂行化時至乃行而化之至度一萬八千九十四國人者不過隱處一小小道隱齊而已不及求人所以亦不得為聖真學者之所遇乃以一筆救天下後世迷唯成書可以代面命雖遍天下盡後世凡有見者皆可救其迷惑然而迷自軒轅氏御女保生之術一倡軒轅者君天下者忌嗣子之少故用後宮之多淫姤之多必不可不節欲後世學者豈可以節欲之人事而遂誤指為長生不死神通之仙道乎而真僞爭途四千餘年矣仙道是出世間法真也御女術是在世間法而非仙僞也本不同者凡學仙聖真既有大志有聖德必不可學御女以招天誅凡學御女者輕縱淫樂壞女子之身喪女子之恥志極卑污敗仙佛根基種子天律嚴密又豈容於談道真者幸有天降異傳而作仙佛漢之張道陵葛玄仙翁冦謙之于吉皆太上降下而傳北漢時之鍾離正陽乃東華帝君之降傳唐之純陽呂翁乃鍾離之降傳宋之王重陽燕之劉海蟾乃鍾呂二真之降傳世尊佛乃阿私陀仙之降傳故法華經佛云昔者仙人授佛妙法如來因之遂致成佛是也所以伍子言非仙不能度仙非佛不能度佛此亦破迷之一說也僞者自愈熾說遍天下而迷人熾說者建立各種門戶曰三峯採戰者曰小採補者大採補者曰童男童女開關補氣者曰對爐者曰入爐者不入爐者千種淫穢無恥以之為世事用尚甚可恥又安可妄誑人曰道乎所以道隱齊評之曰嘗見犬猿與陰者聚則撫弄其二物豈可以衣冠人物有禮義廉恥者而如之乎又評之曰蠢動如蚊蛾虱類人共見其不學而能相姤豈有不蠢如人反不如之而學人為姤乎以速死喪命之事而愚弄人曰接命不死其迷於自愚又迷於邪說之誑如此豫請諸人破迷改過且自安生保見在之福以此大迷之世而論說之宜直宜淺其可少乎哉泄論說之功豈不大哉泄萬古聖真密旨天機書之遍與凡夫言固有罪矣但後來聖真得明道於論說之所泄豈不是此莫大之功乎然泄道未必無干於天罪敢望曰天不之罪而故意冒干之耶即此一點破家學道慈心救世之為功抑可贖罪哉得悟於天下後世劫獨超出大迷而為聖為真者又可無此泄道功之報哉後來聖真得明正道於論說不被邪說坑陷而竟成聖成真亦當報今泄道之功見此者幸毋謂我一見是書已盡見其道見之固易而生易見之心靡不亦自輕易視其性命書成道之粗迹耳道之精真者曰理道之實行者曰事理可以書求事不可盡以書行必要真誠參師學道凡未得師者以此書考尋正門為引進即此以為引進師也已得師傳者以此書印證是否而為信受奉行此即是印證師也若不求真師救度專向書本上誦章句偶見一斑妄稱全豹愚謂只可言悟書不可言悟性悟道由懷易見之心不識為難遇難聞之天寶則其輕易視性命而喪失者將必不免矣毋謂我一見書便見此道實可易行正遂我畏難之心即此易行而易行之自執善悟不求師而按圖索駿焉能了悟到至玄至妙之真實處而修證性命書固載道正欲使人明道而淺直之古云得訣歸來好看書若先得真師真訣則見書真可盡見道真知易行若謂不必求師道已了然盡見易行古云差毫髮不成丹恐難悟透亦不免依然失性命也古云性由自悟或可因書命要師傳必經口耳則信之真而行之勇此我今所望於後聖後真也故又誡之曰毋輕忽為易尤毋謂盜此為說言可應世理可驚人足以師任之於已以徒視乎其人有此誑人之心為障為礙恥於低頭實學竟不自悟自修自證而亦不免於失性命有等人不真實參師學道唯見此書一遍念幾句誑人曰我盡得傳某人道矣我今足為諸人之師諸人只可為我之徒言至於此即楞嚴經所云未得謂得是為入魔故必害己德而墮為魔民昨有一人即如此誡之說見此未注舊稿遍語人曰我全得某人所傳仙道之妙斯言也非贊揚實貶詞也一則以忽仙道之為易一則以增己學之為博不謂染指吞海曰海盡吞矣而可乎以芥殼量海曰海盡量矣而可乎作是言者可謂無正心無大志又一人在金陵淫惡無度冒稱為我虎皮張真人門下人不知張門先戒絶淫事淫念為初功彼何必自投清淨門討個擯斥為哉於是三者能不肯犯即上三條誡詞也誠心參悟即直論以究仙理徵直論以印師傳真修實悟證聖證真斯不負我染筆時一字一泣當論時欲不直奈何今世正道已盡絶恐無益於救正不得不為仙佛宣明正法欲直論天則有譴而不敢言終必直之而冒譴故一泣我自癸巳至壬子二十年參師護師賣田舍破家計苦心苦行而得悟後之參師者未必能得年之久未必有可賣可破之家而可得故一泣人以一見論而即知我以多年苦而輕泄我以自苦代人之苦我以所賣所破代人之以賣以破故一泣又或有人或有可費之資而不學真仙道者徒費耳雖費而不求明如何修命得命之證如何修性得性之證泛然無著者徒費耳雖費而不苦心志苦功行以求必悟必成者徒費耳故一泣我又為衆言此以勸誡之為終天地劫運之聖真直而論泣而論者既為參難泄易而割捨天機又為世界既絶仙佛正道愈傳愈假我獨得悟又焉敢不為仙佛正道留一線之真耶令世世聖真得所考據而為師資矣將流行於天地之終而度盡仙佛種子為聖為真成仙成佛之心也歟今世皆好房術淫欲而仙佛正道則絶盡淫欲心反正道雖見之亦不能救正間或有從救而不足必成書流行以終天地則盡未來之仙佛皆得普度是我繼諸仙翁救世度人立三千功行為自修而已矣即純陽翁所謂度盡衆生世尊佛及地藏菩薩亦謂度盡衆生言自利利人之果唯如是而後圓滿
